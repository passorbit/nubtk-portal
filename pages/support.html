<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support — NUBTK Portal</title>
  <link rel="stylesheet" href="../css/main.css">
  <style>
    body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background: #0f172a; margin: 0; }
    .support-container { width: 90%; max-width: 500px; background: #1e293b; padding: 30px; border-radius: 12px; border: 1px solid #334155; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; color: #94a3b8; margin-bottom: 8px; font-weight: bold; }
    .form-group input, .form-group textarea { width: 100%; padding: 12px; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 6px; box-sizing: border-box; font-family: inherit; }
    .btn-submit { background: #38bdf8; color: #0f172a; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1rem; transition: background 0.3s; }
    .btn-submit:hover { background: #0ea5e9; }
    .success-msg { display: none; color: #10b981; text-align: center; margin-top: 15px; font-weight: bold; background: rgba(16, 185, 129, 0.1); padding: 10px; border-radius: 6px; }
  </style>
</head>
<body>

  <div class="support-container">
    <h2 style="color: white; text-align: center; margin-top: 0;">Contact Support 🛠️</h2>
    <p style="color: #94a3b8; text-align: center; margin-bottom: 25px;">Facing any issues? Send a direct message to the admin.</p>
    
    <form id="support-form">
      <div class="form-group">
        <label>Name</label>
        <input type="text" id="sender-name" required placeholder="Enter your full name">
      </div>
      <div class="form-group">
        <label>Student ID / Batch (Optional)</label>
        <input type="text" id="sender-id" placeholder="e.g. CSE-1234">
      </div>
      <div class="form-group">
        <label>Message / Issue</label>
        <textarea id="sender-msg" rows="5" required placeholder="Describe your problem here..."></textarea>
      </div>
      <button type="submit" class="btn-submit">Send Message</button>
      <div id="success-msg" class="success-msg">Message sent successfully! We will look into it.</div>
    </form>
  </div>

  <!-- Firebase Scripts -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-check-compat.js"></script>
  <script>
    // আপনার আসল Firebase Config
    const firebaseConfig = {
      apiKey: "AIzaSyBU5UyzEIxCuYN5xGLuGL_p4aGltqStylA",
      authDomain: "nubtk-portal.firebaseapp.com",
      databaseURL: "https://nubtk-portal-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "nubtk-portal",
      storageBucket: "nubtk-portal.firebasestorage.app",
      messagingSenderId: "45891604739",
      appId: "1:45891604739:web:33251f784080f09816d936"
    };

    // ফায়ারবেস ইনিশিয়ালাইজেশন
    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
      const appCheck = firebase.appCheck();
appCheck.activate(
  '6LfgyEEtAAAAAHQSS-8guIgRI_pdHO3kyar9Lreo', // তোমার Site key
  true // token auto-refresh
);
    }
    const supportDb = firebase.database();

    // ফর্ম সাবমিট করার লজিক
    document.getElementById('support-form').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const name = document.getElementById('sender-name').value;
      const studentId = document.getElementById('sender-id').value;
      const msg = document.getElementById('sender-msg').value;
      
      const now = new Date();
      const timestamp = now.toLocaleDateString() + " " + now.toLocaleTimeString();

      supportDb.ref('support_messages').push({
        name: name,
        studentId: studentId,
        message: msg,
        time: timestamp
      }).then(() => {
        document.getElementById('success-msg').style.display = 'block';
        document.getElementById('support-form').reset();
        
        setTimeout(() => {
          document.getElementById('success-msg').style.display = 'none';
        }, 4000);
      }).catch(err => {
        console.error("Error saving message: ", err);
        alert("Failed to send message. Please check console.");
      });
    });

    
    (function() {
  const PAGE_NAME = 'support'; // পেজ অনুযায়ী নাম চেঞ্জ করবেন (যেমন cover.html এর জন্য 'cover' দেবেন)
  const db = firebase.database();
  
  // Total visit count
  db.ref('visitors/total_visits').transaction(v => (v || 0) + 1).catch(e => console.error(e));
  db.ref('visitors/pages/' + PAGE_NAME).transaction(v => (v || 0) + 1).catch(e => console.error(e));
  
  // Online count — ডট (.) সমস্যা ফিক্স করা হয়েছে
  const onlineRef = db.ref('visitors/online_count');
  
  // সেফ আইডি তৈরি
  const safeRandomId = Date.now() + '_' + Math.floor(Math.random() * 1000);
  const userRef = db.ref('visitors/online_users/' + safeRandomId);
  
  userRef.set(true).catch(e => console.error(e));
  userRef.onDisconnect().remove();
  
  db.ref('visitors/online_users').on('value', snap => {
    const count = snap.numChildren();
    onlineRef.set(count).catch(e => console.error(e));
  });
})();
  </script>

  <script src="../navbar.js"></script>
</body>
</html>
