<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Memory Match — NUBTK Portal</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <style>
    .game-wrapper { max-width: 450px; margin: 30px auto; text-align: center; }
    .grid { 
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; 
      perspective: 1000px; margin-top: 20px;
    }
    .card { 
      aspect-ratio: 1; background: #1e293b; border-radius: 8px; cursor: pointer;
      transform-style: preserve-3d; transition: transform 0.5s;
    }
    .card.flipped { transform: rotateY(180deg); }
    .card .front, .card .back {
      position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
      display: flex; align-items: center; justify-content: center; font-size: 2rem;
    }
    .card .back { background: #C9A84C; transform: rotateY(180deg); border-radius: 8px; }
    .card .front { background: #0f172a; border: 2px solid #334155; border-radius: 8px; }
  </style>
</head>
<body>

<div class="page-wrap">
  <div class="page-header"><h1>Memory Match 🃏</h1><p>Match the tech icons!</p></div>
  <div class="game-wrapper">
    <div id="grid" class="grid"></div>
    <button onclick="initGame()" style="margin-top:20px; padding:10px 20px; cursor:pointer;">Restart Game</button>
  </div>
</div>

<script>
  const icons = ['💻', '💾', '⚡', '🤖', '🌐', '🐍', '⚛️', '🖥️'];
  let cards = [...icons, ...icons];
  const grid = document.getElementById('grid');
  let flipped = [];
  let lock = false;

  function initGame() {
    grid.innerHTML = '';
    cards.sort(() => Math.random() - 0.5);
    cards.forEach((icon, i) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `<div class="front">?</div><div class="back">${icon}</div>`;
      card.dataset.icon = icon;
      card.onclick = flip;
      grid.appendChild(card);
    });
  }

  function flip() {
    if (lock || this.classList.contains('flipped')) return;
    this.classList.add('flipped');
    flipped.push(this);
    if (flipped.length === 2) checkMatch();
  }

  function checkMatch() {
    lock = true;
    const [c1, c2] = flipped;
    if (c1.dataset.icon === c2.dataset.icon) {
      flipped = []; lock = false;
    } else {
      setTimeout(() => { c1.classList.remove('flipped'); c2.classList.remove('flipped'); flipped = []; lock = false; }, 1000);
    }
  }
  initGame();
</script>
</body>
</html>
