<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Payment Dues — NUBTK Portal</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-check-compat.js"></script>

  <style>
    .dues-container { max-width: 650px; margin: 0 auto; }
    
    .search-wrap { position: relative; margin-top: 20px; }
    
    .suggest-box {
      position: absolute; top: 100%; left: 0; right: 0;
      background: var(--card-bg); border: 1px solid var(--gold);
      border-radius: 8px; margin-top: 5px; z-index: 100;
      max-height: 250px; overflow-y: auto; display: none;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }
    .suggest-item {
      padding: 12px 16px; cursor: pointer; color: #fff; font-size: 0.95rem;
      border-bottom: 1px solid rgba(255,255,255,0.05); transition: 0.2s;
      display: flex; justify-content: space-between; align-items: center;
    }
    .suggest-item:last-child { border-bottom: none; }
    .suggest-item:hover { background: rgba(201,168,76,0.15); color: var(--gold); }
    
    .student-badge { background: rgba(255,255,255,0.1); padding: 3px 8px; border-radius: 4px; font-size: 0.8rem; color: #bbb; }

    .result-card { display: none; margin-top: 25px; animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
    .info-box { background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 15px; border-radius: 8px; }
    .info-box span { display: block; font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
    .info-box strong { font-size: 1.1rem; color: #fff; }
    
    .highlight-box { background: rgba(248, 113, 113, 0.1); border: 1px solid #f87171; grid-column: span 2;}
    .highlight-box span { color: #fca5a5; }
    .highlight-box strong { color: #f87171; font-size: 1.5rem; }
    
    .scholar-box strong { color: #4ade80; }
  </style>
</head>
<body>

<div class="page-wrap" style="padding-bottom:60px;">
  <div class="page-header">
    <div class="breadcrumb"><a href="../index.html">Home</a> › Payment Dues</div>
    <h1>Student Finance</h1>
    <p>Check your payment dues, scholarships, and finance status easily.</p>
  </div>

  <div class="dues-container">
    <div class="section-card">
      <h2 id="duesTitle" style="text-align:center; color:var(--gold); font-size: 1.3rem;">Loading Due List...</h2>
      
      <div class="search-wrap">
        <input type="text" id="studentSearch" class="form-input" placeholder="🔍 Enter last 2, 4, or full Student ID..." autocomplete="off" />
        <div id="searchDropdown" class="suggest-box"></div>
      </div>
    </div>

    <div id="studentDetails" class="section-card result-card">
      <div style="border-bottom: 1px solid var(--border); padding-bottom: 15px; margin-bottom: 15px;">
        <h2 id="stName" style="color: #fff; font-size: 1.4rem; margin-bottom: 5px;">Student Name</h2>
        <span id="stIdBadge" class="student-badge" style="background: var(--gold); color: #000; font-weight: bold;">ID: </span>
      </div>

      <div class="info-grid" id="infoGrid">
        </div>
    </div>
  </div>
</div>

<script>
// ─── FIREBASE SETUP ───
const firebaseConfig = {
  apiKey: "AIzaSyBU5UyzEIxCuYN5xGLuGL_p4aGltqStylA",
  authDomain: "nubtk-portal.firebaseapp.com",
  databaseURL: "https://nubtk-portal-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "nubtk-portal",
  storageBucket: "nubtk-portal.firebasestorage.app",
  messagingSenderId: "45891604739",
  appId: "1:45891604739:web:33251f784080f09816d936"
};
firebase.initializeApp(firebaseConfig);

const appCheck = firebase.appCheck();
appCheck.activate(
  new firebase.appCheck.ReCaptchaV3Provider('6LcPtEItAAAAAI8ba4bJ1v6qihfg8dFkVmMKKfGI'),
  true
);
const db = firebase.database();

// ─── FETCH & SEARCH LOGIC ───
let allStudentsData = {};

// Load data on page load
window.onload = function() {
  const dbRef = db.ref('payment_dues');
  dbRef.on('value', (snapshot) => {
    const data = snapshot.val();
    if(data) {
      document.getElementById('duesTitle').innerText = data.title || "Payment Dues List";
      allStudentsData = data.students || {};
    } else {
      document.getElementById('duesTitle').innerText = "No Due List Published Yet";
    }
  });
};

const searchInput = document.getElementById('studentSearch');
const dropdown = document.getElementById('searchDropdown');

searchInput.addEventListener('input', function() {
  const input = this.value.trim();
  dropdown.innerHTML = ""; 
  
  if (input.length < 2) {
    dropdown.style.display = "none";
    return;
  }

  let matches = [];
  for (let id in allStudentsData) {
    if (id.includes(input) || id.endsWith(input)) {
      matches.push({ id: id, data: allStudentsData[id] });
    }
  }

  if (matches.length > 0) {
    dropdown.style.display = "block";
    matches.forEach(match => {
      let div = document.createElement('div');
      div.className = 'suggest-item';
      div.innerHTML = `<span>${match.data['Student Full Name']}</span> <span class="student-badge">${match.id}</span>`;
      
      div.onclick = () => showDetails(match.id);
      dropdown.appendChild(div);
    });
  } else {
    dropdown.style.display = "block";
    dropdown.innerHTML = `<div class="suggest-item" style="color: #f87171; justify-content: center;">No matching student found</div>`;
  }
});

// Hide dropdown if clicked outside
document.addEventListener('click', function(e) {
  if (e.target !== searchInput && !dropdown.contains(e.target)) {
    dropdown.style.display = 'none';
  }
});

function showDetails(studentID) {
  const student = allStudentsData[studentID];
  dropdown.style.display = "none";
  searchInput.value = ""; 
  
  const card = document.getElementById('studentDetails');
  const infoGrid = document.getElementById('infoGrid');
  
  document.getElementById('stName').innerText = student['Student Full Name'];
  document.getElementById('stIdBadge').innerText = "ID: " + studentID;
  
  infoGrid.innerHTML = ""; // Clear previous data

  // Fields to display (Must match CSV headers roughly)
  const fieldsToShow = [
    { key: "Total Received", label: "Total Received" },
    { key: "Scholar ", label: "Scholarship (%)" },
    { key: "Previous Dues", label: "Previous Dues" },
    { key: "Total   Payable", label: "Total Payable" },
    { key: "Received Amount", label: "Recently Received" },
    { key: "Net Payable", label: "Net Payable" }
  ];

  fieldsToShow.forEach(field => {
    if(student[field.key] !== undefined) {
      let div = document.createElement('div');
      div.className = 'info-box';
      if(field.key === "Scholar ") div.classList.add('scholar-box');

      let value = student[field.key];
      // Format money (Add ৳ sign if it's a number/money value)
      if (value !== "" && !isNaN(value.replace(/,/g, ''))) value = "৳ " + value;
      if (field.key === "Scholar " && value !== "") value = value + "%";

      div.innerHTML = `<span>${field.label}</span> <strong>${value || '0'}</strong>`;
      infoGrid.appendChild(div);
    }
  });

  // Dynamic Dues Highlight Box
  let duesKey = Object.keys(student).find(k => k.toLowerCase().includes('100% dues') || k.toLowerCase().includes('due amount'));
  if (duesKey && student[duesKey]) {
    let div = document.createElement('div');
    div.className = 'info-box highlight-box';
    
    let dueAmount = student[duesKey];
    if (!isNaN(dueAmount.replace(/,/g, ''))) dueAmount = "৳ " + dueAmount;

    div.innerHTML = `<span>Total Due Amount</span> <strong>${dueAmount}</strong>`;
    infoGrid.appendChild(div);
  }

  card.style.display = "block";
}

// ─── PAGE VISITOR TRACKING ───
(function() {
  const PAGE_NAME = 'dues'; // পেজ অনুযায়ী নাম চেঞ্জ করবেন (যেমন cover.html এর জন্য 'cover' দেবেন)
  const db = firebase.database();
  
  // Total visit count
  db.ref('visitors/total_visits').transaction(v => (v || 0) + 1).catch(e => console.error(e));
  db.ref('visitors/pages/' + PAGE_NAME).transaction(v => (v || 0) + 1).catch(e => console.error(e));
  
  // Online count — ডট (.) সমস্যা ফিক্স করা হয়েছে
  const onlineRef = db.ref('visitors/online_count');
  
  // সেফ আইডি তৈরি
  const safeRandomId = Date.now() + '_' + Math.floor(Math.random() * 1000);
  const userRef = db.ref('visitors/online_users/' + safeRandomId);
  
  userRef.set(true).catch(e => console.error(e));
  userRef.onDisconnect().remove();
  
  db.ref('visitors/online_users').on('value', snap => {
    const count = snap.numChildren();
    onlineRef.set(count).catch(e => console.error(e));
  });
})();
</script>

<script src="../navbar.js"></script>
</body>
</html>
