    .slot-input:focus { border-color: #C9A84C; background: #fff; box-shadow: 0 0 0 3px rgba(201,168,76,0.15); }
    .slot-input.course-input { width: 140px; }

      /* ম্যাজিক ট্রিকস: বক্সের সীমানা পর্যন্ত ব্যাকগ্রাউন্ড টেনে নেওয়া */

<div class="page-wrap" style="padding-bottom:60px;">

  <div class="section-card">
    <h2>Find Your Routine</h2>
        <div class="section-search-box">

<div class="notif" id="notif"></div>

<script>

  const n = document.getElementById('notif');
  n.textContent = msg; n.classList.add('show');
  setTimeout(() => n.classList.remove('show'), dur);

  apiKey: "AIzaSyBU5UyzEIxCuYN5xGLuGL_p4aGltqStylA",
  authDomain: "nubtk-portal.firebaseapp.com",
  databaseURL: "https://nubtk-portal-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "nubtk-portal",
  storageBucket: "nubtk-portal.firebasestorage.app",
  messagingSenderId: "45891604739",
  appId: "1:45891604739:web:33251f784080f09816d936"
};
firebase.initializeApp(firebaseConfig);

appCheck.activate(
  '6LfgyEEtAAAAAHQSS-8guIgRI_pdHO3kyar9Lreo', // তোমার Site key
  true // token auto-refresh
);
const db = firebase.database();

// আপনার যোগ করা নতুন টাইম স্লটগুলো এখানে দেওয়া হলো
const TIME_SLOTS = ['08:30 AM', '09:40 AM', '10:50 AM', '12:00 PM', '02:10 PM', '03:20 PM', '04:30 PM'];
const DAYS = ['Saturday', 'Sunday', 'Tuesday', 'Wednesday', 'Thursday' ];

// ─── GENERATE ROUTINE FROM FIREBASE ─────────
let currentSectionData = {};

function generateRoutine() {
  const section = document.getElementById('section-input').value.trim().toUpperCase();
  if (!section) { notify('⚠️ Please enter your section!'); return; }

  notify('⏳ Fetching live routine...');
  const result = document.getElementById('routine-result');

  db.ref('routines/' + section).once('value').then((snapshot) => {
    const secData = snapshot.val();

    // ─── 🔴 আপডেটেড Not Found মেসেজ এবং Manual Create বাটন ───
    if (!secData) {
      result.innerHTML = `
        <div class="section-card" style="text-align: center; padding: 50px 20px; background: #fafafa; border: 2px dashed #cbd5e1; border-radius: 12px; margin-top: 20px;">
            <div style="font-size: 3.5rem; margin-bottom: 15px;">📭</div>
            <h3 style="color: #ef4444; font-size: 1.6rem; font-weight: 800; margin-bottom: 10px;">Routine Not Found!</h3>
            <p style="color: #64748b; margin-bottom: 25px; font-size: 1rem; line-height: 1.5;">
                Maybe the Routine not updated by Author for <strong style="color:#0f172a;">Section ${section}</strong> yet.<br>Please check if the OFFICIAL Routine has been published yet.
            </p>
            <button class="btn btn-outline" onclick="loadManualBuilder()" style="border-color: #C9A84C; color: #C9A84C; border-width: 2px;">
                ✍️ Create One Manually
            </button>
        </div>
      `;
      notify('❌ Routine not found!');
      return;
    }
    // ─── 🔴 নতুন অংশ শেষ ───

    let rows = '';
    TIME_SLOTS.forEach(time => {
      let row = `<tr><td style="font-weight:700;color:#0B1D3A;white-space:nowrap;background:#f8f8ff;padding:8px 12px;">${time}</td>`;
      DAYS.forEach(day => {
        const key = `${day}|${time}`;
        const cell = secData[key];
        if (cell) {
          const badgeClass = cell.type === 'lab' ? 'badge-lab' : cell.type === 'phy-lab' ? 'badge-phy-lab' : 'badge-theory';
          const badgeLabel = cell.type === 'lab' ? 'LAB' : cell.type === 'phy-lab' ? 'PHY LAB' : 'THEORY';
          row += `<td>
            <div class="cell-course">${cell.course}</div>
            <div class="cell-room">${cell.room}</div>
            <span class="cell-badge ${badgeClass}">${badgeLabel}</span>
          </td>`;
        } else {
          row += `<td class="empty">—</td>`;
        }
      });
      row += '</tr>';
      rows += row;
    });

    result.innerHTML = `
      <div class="section-card" style="padding:0;overflow:hidden;" id="routine-card">
        <div style="padding:24px 28px 0;">
          <div class="btn-row" style="margin-top:0;margin-bottom:20px;">
            <button class="btn btn-gold" onclick="downloadRoutinePDF()">⬇️ PDF</button>
            <button class="btn btn-outline" onclick="downloadRoutineJPG()">🖼️ JPG</button>
            <button class="btn btn-outline" style="border-color:#3b82f6; color:#3b82f6;" onclick="editGeneratedRoutine()">✏️ Edit This Routine</button>
          </div>
        </div>
        <div style="padding:0 28px 28px;">
          <div class="routine-output-wrap" id="routine-printable">
            <div class="routine-header-block">
              <div class="uni">Northern University of Business &amp; Technology Khulna</div>
              <div class="title">Class Schedule · Spring 2025</div>
              <div class="section-badge">SECTION — ${section}</div>
            </div>
            <div style="overflow-x:auto;">
              <table class="routine-table">
                <thead>
                  <tr>
                    <th>TIME</th>
                    ${DAYS.map(d => `<th>${d.toUpperCase()}</th>`).join('')}
                  </tr>
                </thead>
                <tbody>${rows}</tbody>
              </table>
              </div>
            </div>
          </div>
        </div>
        <div style="text-align: center; margin-top: 20px; padding-top: 12px; border-top: 1px dashed #cbd5e1; font-size: 0.75rem; color: #64748b; font-style: italic;">
              ⚠️ <strong style="color: #ef4444;">Disclaimer:</strong> This routine schedule is automatically compiled. Please re-check with the official department notices to ensure accuracy.
        </div>
      </div>`;
    notify(`✅ Routine loaded for Section ${section}`);
  }).catch((error) => {
    notify('❌ Error connecting to database!');
    console.error(error);
  });
}

// ─── SMART PDF DOWNLOAD (BULLETPROOF SINGLE PAGE) ───
function downloadRoutinePDF() {
  const el = document.getElementById('routine-printable');
  const tableWrap = el.querySelector('div[style*="overflow-x"]');
  
  const origOverflow = tableWrap ? tableWrap.style.overflowX : '';
  const origWidth = el.style.width;
  const origMinWidth = el.style.minWidth;
  const origMargin = el.style.margin;

  if (tableWrap) tableWrap.style.overflowX = 'visible';
  el.style.width = 'max-content'; 
  el.style.minWidth = '1000px'; 
  el.style.margin = '0 auto 0 0'; 

  notify('⏳ Preparing perfect single-page PDF...');

  setTimeout(() => {
    const secInput = document.getElementById('section-input');
    const secName = secInput && secInput.value.trim() ? secInput.value.trim() : 'Custom';

    // 🔴 নতুন উচ্চতা মাপা (যেন ২ পেজে না কাটে)
    const fullWidth = el.scrollWidth;
    const fullHeight = el.scrollHeight + 30; // এক্সট্রা প্যাডিং

    html2pdf().set({
      margin: 10,
      filename: `NUBTK_Routine_Section_${secName}.pdf`,
      image: { type: 'jpeg', quality: 0.98 },
      html2canvas: { scale: 2, useCORS: true, scrollY: 0 },
      // 🔴 ম্যাজিক ট্রিক: A4 এর বদলে ডায়নামিক ফরম্যাট
      jsPDF: { unit: 'px', format: [fullWidth, fullHeight], orientation: 'landscape' },
      pagebreak: { mode: ['avoid-all'] } 
    }).from(el).save().then(() => {
      if (tableWrap) tableWrap.style.overflowX = origOverflow;
      el.style.width = origWidth;
      el.style.minWidth = origMinWidth;
      el.style.margin = origMargin;
      notify('✅ PDF Downloaded Successfully!');
    });
  }, 150); 
}

function downloadRoutineJPG() {
  const el = document.getElementById('routine-printable');
  const tableWrap = el.querySelector('div[style*="overflow-x"]');
  const table = el.querySelector('.routine-table');

  // আসল টেবিলের সাইজ মাপা (প্যাডিং সহ)
  const fullWidth = table ? table.offsetWidth + 60 : el.scrollWidth;

  // আগের স্টাইলগুলো সেভ করে রাখা
  const originalOverflow = tableWrap ? tableWrap.style.overflowX : '';
  const originalWidth = el.style.width;

  // মোবাইল স্ক্রিনের লিমিট ভেঙে জোর করে ফুল সাইজ করে দেওয়া
  if (tableWrap) tableWrap.style.overflowX = 'visible';
  el.style.width = fullWidth + 'px';

  notify('⏳ Preparing full JPG...');

  html2canvas(el, { 
    scale: 2, 
    useCORS: true, 
    scrollY: 0, 
    backgroundColor: '#fff',
    width: fullWidth,        // ক্যানভাসকে ফুল সাইজ বলা
    windowWidth: fullWidth   // ব্রাউজার উইন্ডোকেও ফুল সাইজ ভাবানো
  }).then(canvas => {
    // ডাউনলোড শেষ, এবার আবার আগের সাইজে ফিরিয়ে আনা
    if (tableWrap) tableWrap.style.overflowX = originalOverflow;
    el.style.width = originalWidth;
    
    const link = document.createElement('a');
    link.download = `NUBTK_Routine_Section_${document.getElementById('section-input') ? document.getElementById('section-input').value.trim() : 'Custom'}.jpg`;
    link.href = canvas.toDataURL('image/jpeg', 0.95);
    link.click();
    notify('✅ JPG Downloaded Successfully!');
  });
}


// ─── MANUAL ROUTINE BUILDER (Admin Style) ───
function loadManualBuilder() {
  const savedDraft = localStorage.getItem('routine_manual_draft');
  let draftData = {};
  let savedSection = '';
  
  if (savedDraft) {
    const parsed = JSON.parse(savedDraft);
    draftData = parsed.data || {};
    savedSection = parsed.section || '';
  }

  const currentInputSec = document.getElementById('section-input').value.trim().toUpperCase();
  const sec = currentInputSec || savedSection || 'CUSTOM';
  const result = document.getElementById('routine-result');

  let html = `
  <div class="section-card" style="background:#f8fafc; border: 1px solid #e2e8f0;">
    <div style="text-align:center; margin-bottom:10px; display:flex; justify-content:center; align-items:center; gap:10px;">
      <h3 style="color:var(--gold); margin:0;">Manual Builder:</h3>
      <input type="text" id="manual-sec-input" class="form-input" value="${sec === 'CUSTOM' ? '' : sec}" placeholder="Section" style="width: 110px; text-align: center; font-size: 1rem; font-weight: bold; text-transform: uppercase; padding: 6px 10px; border: 2px solid var(--gold);" oninput="this.value=this.value.toUpperCase()">
    </div>
    
    <p style="font-size:0.8rem; color:#ef4444; text-align:center; margin-bottom:15px; font-weight: 600;">
       ⚠️ Note: The "Class Name" should not exceed 20 characters to fit perfectly.
    </p>

    <div class="btn-row" style="justify-content: center; margin-bottom: 20px; gap: 8px;">
        <button class="btn btn-outline" onclick="saveRoutineDraft()" style="font-size:0.8rem; padding: 6px 12px; border-color:#3b82f6; color:#3b82f6;">💾 Save Draft</button>
        <button class="btn btn-outline" onclick="resetManualForm()" style="font-size:0.8rem; padding: 6px 12px; border-color:#f87171; color:#f87171;">↺ Reset Form</button>
    </div>
    
    <div>`;

  DAYS.forEach(day => {
    html += `<div class="routine-day-block"><h4>${day}</h4>`;
    TIME_SLOTS.forEach(time => {
      const key = `${day}|${time}`;
      // 🔴 className প্রপার্টি অ্যাড করা হলো
      const val = draftData[key] || { course: '', room: '', type: 'theory', className: '' };
      
      html += `<div class="routine-slot-row">
        <span class="slot-time">${time}</span>
        <input type="text" class="slot-input course-input" placeholder="Code (CSE 1101)" data-key="${key}" data-field="course" value="${val.course}"/>
        
        <input type="text" class="slot-input name-input" placeholder="Class Name" data-key="${key}" data-field="className" value="${val.className || ''}" maxlength="20"/>
        
        <input type="text" class="slot-input room-input" placeholder="Room" data-key="${key}" data-field="room" value="${val.room}"/>
        <select class="slot-input slot-type-sel" data-key="${key}" data-field="type">
          <option value="theory" ${val.type === 'theory' ? 'selected' : ''}>Theory</option>
          <option value="lab" ${val.type === 'lab' ? 'selected' : ''}>Lab</option>
          <option value="phy-lab" ${val.type === 'phy-lab' ? 'selected' : ''}>Phy Lab</option>
        </select>
      </div>`;
    });
    html += `</div>`;
  });

  html += `</div>
    <div class="btn-row" style="justify-content: center; margin-top: 25px;">
        <button class="btn btn-gold" onclick="previewManualRoutine()">👁️ Preview & Download</button>
      <button class="btn btn-outline" onclick="document.getElementById('routine-result').innerHTML=''">❌ Close</button>
    </div>
  </div>`;

  result.innerHTML = html;
}


// ─── PREVIEW MANUAL ROUTINE ───
function previewManualRoutine() {
  saveRoutineDraft(false); // প্রিভিউতে যাওয়ার আগে ডাটা মেমোরিতে সেভ করে রাখা
  
  // সেভ হওয়া ড্রাফট থেকে সেকশনের নাম নেওয়া
  const draftObj = JSON.parse(localStorage.getItem('routine_manual_draft') || '{}');
  const sec = draftObj.section || 'CUSTOM';

  const secData = {};
  
  // ফর্ম থেকে ডাটা কালেক্ট করা
  document.querySelectorAll('.slot-input[data-key]').forEach(el => {
    const key = el.dataset.key;
    const field = el.dataset.field;
    if (!secData[key]) secData[key] = {};
    secData[key][field] = el.value.trim();
  });

  // ফাঁকা ঘরগুলো ডিলিট করা
  Object.keys(secData).forEach(k => {
    if (!secData[k].course) delete secData[k];
  });

  // প্রিন্ট করার জন্য টেবিল জেনারেট করা
  let rows = '';
  TIME_SLOTS.forEach(time => {
    let row = `<tr><td style="font-weight:700;color:#0B1D3A;white-space:nowrap;background:#f8f8ff;padding:8px 12px;">${time}</td>`;
    DAYS.forEach(day => {
      const key = `${day}|${time}`;
      const cell = secData[key];
      if (cell) {
        const badgeClass = cell.type === 'lab' ? 'badge-lab' : cell.type === 'phy-lab' ? 'badge-phy-lab' : 'badge-theory';
        const badgeLabel = cell.type === 'lab' ? 'LAB' : cell.type === 'phy-lab' ? 'PHY LAB' : 'THEORY';
        
        // 🔴 Class Name থাকলে সেটা রেন্ডার করবে
        const classNameHtml = cell.className ? `<div class="cell-class-name">${cell.className}</div>` : '';

        row += `<td>
          <div class="cell-course">${cell.course}</div>
          <div class="cell-room">${cell.room}</div>
          <div style="margin-top:2px;"><span class="cell-badge ${badgeClass}">${badgeLabel}</span></div>
          ${classNameHtml}
        </td>`;
      } else {
        row += `<td class="empty">—</td>`;
      }
    });
    row += '</tr>';
    rows += row;
  });

  const result = document.getElementById('routine-result');
  result.innerHTML = `
    <div class="section-card" style="padding:0;overflow:hidden;" id="routine-card">
      <div style="padding:24px 28px 0;">
        <div class="btn-row" style="margin-top:0;margin-bottom:20px; display:flex; justify-content:center; gap:10px;">
          <button class="btn btn-gold" onclick="downloadRoutinePDF()">⬇️ Download PDF</button>
          <button class="btn btn-outline" onclick="downloadRoutineJPG()">🖼️ Download JPG</button>
          <button class="btn btn-outline" style="border-color:#f87171; color:#f87171;" onclick="loadManualBuilder()">✏️ Back to Edit</button>
        </div>
      </div>
      <div style="padding:0 28px 28px;">
        <div class="routine-output-wrap" id="routine-printable">
          <div class="routine-header-block">
            <div class="uni">Northern University of Business &amp; Technology Khulna</div>
            <div class="title">Class Schedule · Custom Builder</div>
            <div class="section-badge">SECTION — ${sec}</div>
          </div>
          <div style="overflow-x:auto;">
            <table class="routine-table">
              <thead>
                <tr>
                  <th>TIME</th>
                  ${DAYS.map(d => `<th>${d.toUpperCase()}</th>`).join('')}
                </tr>
              </thead>
              <tbody>${rows}</tbody>
            </table>
          </div>
        </div>
      </div>
    </div>`;
}


// ─── DRAFT SYSTEM & PERSISTENCE ───

// ড্রাফট সেভ করার ফাংশন
function saveRoutineDraft(notifyUser = true) {
  const draftData = {};
  // সবগুলো ইনপুট ফিল্ড থেকে ডাটা সংগ্রহ করা
  document.querySelectorAll('.slot-input[data-key]').forEach(el => {
    const key = el.dataset.key;
    const field = el.dataset.field;
    if (!draftData[key]) draftData[key] = {};
    draftData[key][field] = el.value;
  });
  
    const manualSecInput = document.getElementById('manual-sec-input');
  const section = manualSecInput ? manualSecInput.value.trim() : document.getElementById('section-input').value.trim();

  // ব্রাউজারের মেমোরিতে সেভ করা
  localStorage.setItem('routine_manual_draft', JSON.stringify({
    section: section,
    data: draftData
  }));
  
  if(notifyUser) notify('💾 Draft saved successfully!');
}

// ড্রাফট মুছে ফেলার (Reset) ফাংশন
function resetManualForm() {
  if(confirm('Are you sure you want to clear all inputs?')) {
    localStorage.removeItem('routine_manual_draft');
    loadManualBuilder(); // ফর্ম রিফ্রেশ করা
    notify('↺ Form Reset Successful!');
  }
}


  // ─── EDIT GENERATED ROUTINE (SMART EXTRACTION) ───
function editGeneratedRoutine() {
  const section = document.getElementById('section-input').value.trim().toUpperCase();
  const draftData = {};

  // স্ক্রিনে দেখা যাচ্ছে এমন টেবিলের সবগুলো সেল থেকে ডাটা কালেক্ট করা
  const tableCells = document.querySelectorAll('#routine-result .routine-table tbody td');
  
  if (tableCells.length === 0) {
    notify('⚠️ No routine data found to edit!');
    return;
  }

  // প্রতিটি সেল চেক করে ডাটা বের করা
  TIME_SLOTS.forEach((time, timeIndex) => {
    DAYS.forEach((day, dayIndex) => {
      // টেবিলের স্ট্রাকচার অনুযায়ী সঠিক ঘরটি খুঁজে বের করা
      // (প্রতি সারির প্রথম ঘরটি Day এর নাম, তাই +1 করা হয়েছে)
      const rowIndex = dayIndex;
      const colIndex = timeIndex + 1; 
      
      const row = document.querySelectorAll('#routine-result .routine-table tbody tr')[rowIndex];
      if (row) {
        const cell = row.cells[colIndex];
        if (cell && !cell.classList.contains('empty') && cell.innerText !== '—') {
          // সেলের ভেতর থেকে Course, Room এবং Badge এর টেক্সট নেওয়া
          const course = cell.querySelector('.cell-course') ? cell.querySelector('.cell-course').innerText.trim() : '';
          const room = cell.querySelector('.cell-room') ? cell.querySelector('.cell-room').innerText.trim() : '';
          const badge = cell.querySelector('.cell-badge') ? cell.querySelector('.cell-badge').innerText.trim() : '';
          
          let type = 'theory';
          if (badge === 'LAB') type = 'lab';
          else if (badge === 'PHY LAB') type = 'phy-lab';

          const classNameNode = cell.querySelector('.cell-class-name');
          const classNameStr = classNameNode ? classNameNode.innerText.trim() : '';

          const key = `${day}|${time}`;
          draftData[key] = { course: course, room: room, type: type, className: classNameStr };
        }
      }
    });
  });

  // কালেক্ট করা ডাটাকে ড্রাফট হিসেবে মেমোরিতে সেভ করা
  localStorage.setItem('routine_manual_draft', JSON.stringify({
    section: section,
    data: draftData
  }));

  // ম্যানুয়াল বিল্ডার লোড করা
  loadManualBuilder();
  notify('✏️ Routine loaded! You can now modify it.');
}



  (function() {
  const PAGE_NAME = 'routine'; // পেজ অনুযায়ী নাম চেঞ্জ করবেন (যেমন cover.html এর জন্য 'cover' দেবেন)
  const db = firebase.database();
  
  // Total visit count
  db.ref('visitors/total_visits').transaction(v => (v || 0) + 1).catch(e => console.error(e));
  db.ref('visitors/pages/' + PAGE_NAME).transaction(v => (v || 0) + 1).catch(e => console.error(e));
  
  // Online count — ডট (.) সমস্যা ফিক্স করা হয়েছে
  const onlineRef = db.ref('visitors/online_count');
  
  // সেফ আইডি তৈরি
  const safeRandomId = Date.now() + '_' + Math.floor(Math.random() * 1000);
  const userRef = db.ref('visitors/online_users/' + safeRandomId);
  
  userRef.set(true).catch(e => console.error(e));
  userRef.onDisconnect().remove();
  
  db.ref('visitors/online_users').on('value', snap => {
    const count = snap.numChildren();
    onlineRef.set(count).catch(e => console.error(e));
  });
})();
