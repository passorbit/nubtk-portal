<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Class Routine — NUBTK Portal</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>
  <style>
    /* CSS Adjustments for 8 Rows */
    .routine-output-wrap {
      background: white; border-radius: 12px; overflow: hidden;
      box-shadow: 0 12px 40px rgba(0,0,0,0.4); padding: 24px; /* Padding reduced to fit content */
    }
    .routine-header-block { text-align: center; margin-bottom: 14px; } /* Margin reduced */
    .routine-header-block .uni { font-size: 13pt; font-weight: 800; color: #0B1D3A; font-family: 'Times New Roman', serif; }
    .routine-header-block .title { font-size: 11pt; font-weight: 700; margin: 6px 0 4px; color: #0B1D3A; letter-spacing: 1px; text-transform: uppercase; }
    .routine-header-block .section-badge {
      display: inline-block; background: #0B1D3A; color: #C9A84C;
      font-size: 10pt; font-weight: 800; padding: 4px 24px; border-radius: 6px;
      letter-spacing: 2px; margin-top: 4px;
    }
    .routine-table { width: 100%; border-collapse: collapse; font-family: var(--ff-body); font-size: 0.78rem; }
    .routine-table th {
      background: #0B1D3A; color: #C9A84C; text-align: center;
      padding: 8px 6px; font-weight: 700; letter-spacing: 0.5px;
      border: 1.5px solid #0B1D3A;
    }
    .routine-table td {
      border: 1px solid #ccc; padding: 6px 4px; text-align: center; /* Padding reduced, removed min-height */
      vertical-align: middle; color: #222; background: white; 
    }
    .routine-table td.empty { background: #fafafa; color: #ccc; font-size: 0.75rem; }
    .cell-course { font-weight: 700; font-size: 0.78rem; color: #0B1D3A; }
    .cell-room { font-size: 0.68rem; color: #666; margin-top: 1px; }
    .cell-badge {
      font-size: 0.6rem; font-weight: 700; padding: 2px 6px; border-radius: 4px;
      display: inline-block; margin-top: 2px; letter-spacing: 0.5px;
    }
    .badge-theory { background: #EBF4FF; color: #1D4ED8; }
    .badge-lab { background: #FEF3C7; color: #B45309; }
    .badge-phy-lab { background: #FCE7F3; color: #9D174D; }

    .section-search-box {
      display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 28px;
    }
    .section-search-box input {
      text-transform: uppercase; font-size: 1.2rem; font-weight: 700;
      letter-spacing: 3px; text-align: center; width: 140px;
    }
    .no-routine {
      text-align: center; padding: 60px 20px; color: var(--muted);
    }
    .no-routine .big { font-size: 3rem; margin-bottom: 12px; }
    .no-routine p { font-size: 0.9rem; }


    /* ✍️ MANUAL BUILDER STYLES (From Admin Panel) */
    .routine-day-block { margin-bottom: 20px; background: #fff; padding: 20px; border-radius: 10px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
    .routine-day-block h4 { color: #0B1D3A; font-size: 1.05rem; font-weight: 800; margin-bottom: 15px; text-transform: uppercase; border-bottom: 2px solid #f1f5f9; padding-bottom: 8px; }
    .routine-slot-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
    .routine-slot-row .slot-time { font-size: 0.85rem; font-weight: 700; color: #64748b; width: 85px; flex-shrink: 0; }
    .slot-input { background: #f8fafc; border: 1px solid #cbd5e1; color: #0f172a; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; padding: 10px 12px; border-radius: 8px; outline: none; transition: 0.2s; }
    .slot-input:focus { border-color: #C9A84C; background: #fff; box-shadow: 0 0 0 3px rgba(201,168,76,0.15); }
    .slot-input.course-input { width: 140px; }
    .slot-input.room-input { width: 110px; }
    .slot-type-sel { width: 120px; cursor: pointer; }

  </style>
</head>
<body>

<div class="page-wrap" style="padding-bottom:60px;">
  <div class="page-header">
    <div class="breadcrumb"><a href="../index.html">Home</a> › Class Routine</div>
    <h1>Class Routine</h1>
    <p>Enter your section code to generate your personalized class schedule from the Live Database.</p>
  </div>

  <div class="section-card">
    <h2>Find Your Routine</h2>
        <div class="section-search-box">
      <div class="form-group" style="margin:0;">
        <label class="form-label">Section (e.g. 2D, 1A, 3B)</label>
        <input type="text" class="form-input" id="section-input" maxlength="3" placeholder="2D"
          style="text-transform:uppercase;font-size:1.2rem;font-weight:700;letter-spacing:3px;text-align:center;width:120px;"
          oninput="this.value=this.value.toUpperCase()"
          onkeydown="if(event.key==='Enter') generateRoutine()"/>
      </div>
      
      <div style="align-self:flex-end; display: flex; gap: 10px;">
        <button class="btn btn-gold" onclick="generateRoutine()">🗓️ Generate Routine</button>
        <button class="btn btn-outline" onclick="loadManualBuilder()" style="border-color: #C9A84C; color: #C9A84C;">✍️ Manual Create</button>
      </div>
    </div>

    <p class="form-hint">Type your section code (like 1A, 2D, 3A etc.) and click Generate.</p>
  </div>

  <div id="routine-result"></div>
</div>

<div class="notif" id="notif"></div>

<script>
function toggleNav() { document.querySelector('.nav-links').classList.toggle('open'); }
function notify(msg, dur=2800) {
  const n = document.getElementById('notif');
  n.textContent = msg; n.classList.add('show');
  setTimeout(() => n.classList.remove('show'), dur);
}

// ─── FIREBASE SETUP ────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyCF9BoDxWa-0XTwbCBxjHrrBdQrKioJua8",
  authDomain: "nubtk-portal.firebaseapp.com",
  databaseURL: "https://nubtk-portal-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "nubtk-portal",
  storageBucket: "nubtk-portal.firebasestorage.app",
  messagingSenderId: "45891604739",
  appId: "1:45891604739:web:33251f784080f09816d936"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// আপনার যোগ করা নতুন টাইম স্লটগুলো এখানে দেওয়া হলো
const TIME_SLOTS = ['08:30 AM', '09:40 AM', '10:50 AM', '12:00 AM', '02:10 PM', '03:20 PM', '04:30 PM'];
const DAYS = ['Saturday', 'Sunday', 'Tuesday', 'Wednesday', 'Thursday' ];

// ─── GENERATE ROUTINE FROM FIREBASE ─────────
function generateRoutine() {
  const section = document.getElementById('section-input').value.trim().toUpperCase();
  if (!section) { notify('⚠️ Please enter your section!'); return; }

  notify('⏳ Fetching live routine...');
  const result = document.getElementById('routine-result');

  db.ref('routines/' + section).once('value').then((snapshot) => {
    const secData = snapshot.val();

    if (!secData) {
      result.innerHTML = `<div class="no-routine">
        <div class="big">🔍</div>
        <p>No routine found for section <strong>${section}</strong>.<br/>
        Please ask your admin to add routine data.</p>
      </div>`;
      notify('❌ Routine not found!');
      return;
    }

    let rows = '';
    TIME_SLOTS.forEach(time => {
      let row = `<tr><td style="font-weight:700;color:#0B1D3A;white-space:nowrap;background:#f8f8ff;padding:8px 12px;">${time}</td>`;
      DAYS.forEach(day => {
        const key = `${day}|${time}`;
        const cell = secData[key];
        if (cell) {
          const badgeClass = cell.type === 'lab' ? 'badge-lab' : cell.type === 'phy-lab' ? 'badge-phy-lab' : 'badge-theory';
          const badgeLabel = cell.type === 'lab' ? 'LAB' : cell.type === 'phy-lab' ? 'PHY LAB' : 'THEORY';
          row += `<td>
            <div class="cell-course">${cell.course}</div>
            <div class="cell-room">${cell.room}</div>
            <span class="cell-badge ${badgeClass}">${badgeLabel}</span>
          </td>`;
        } else {
          row += `<td class="empty">—</td>`;
        }
      });
      row += '</tr>';
      rows += row;
    });

    result.innerHTML = `
      <div class="section-card" style="padding:0;overflow:hidden;" id="routine-card">
        <div style="padding:24px 28px 0;">
          <div class="btn-row" style="margin-top:0;margin-bottom:20px;">
            <button class="btn btn-gold" onclick="downloadRoutinePDF()">⬇️ PDF</button>
            <button class="btn btn-outline" onclick="downloadRoutineJPG()">🖼️ JPG</button>
          </div>
        </div>
        <div style="padding:0 28px 28px;">
          <div class="routine-output-wrap" id="routine-printable">
            <div class="routine-header-block">
              <div class="uni">Northern University of Business &amp; Technology Khulna</div>
              <div class="title">Class Schedule · Spring 2025</div>
              <div class="section-badge">SECTION — ${section}</div>
            </div>
            <div style="overflow-x:auto;">
              <table class="routine-table">
                <thead>
                  <tr>
                    <th>TIME</th>
                    ${DAYS.map(d => `<th>${d.toUpperCase()}</th>`).join('')}
                  </tr>
                </thead>
                <tbody>${rows}</tbody>
              </table>
              </div>
            </div>
          </div>
        </div>
        <div style="text-align: center; margin-top: 20px; padding-top: 12px; border-top: 1px dashed #cbd5e1; font-size: 0.75rem; color: #64748b; font-style: italic;">
              ⚠️ <strong style="color: #ef4444;">Disclaimer:</strong> This routine schedule is automatically compiled. Please re-check with the official department notices to ensure accuracy.
        </div>
      </div>`;
    notify(`✅ Routine loaded for Section ${section}`);
  }).catch((error) => {
    notify('❌ Error connecting to database!');
    console.error(error);
  });
}

function downloadRoutinePDF() {
  const el = document.getElementById('routine-printable');
  // PDF এর ওপর-নিচের মার্জিন একটু কমিয়ে দেওয়া হয়েছে যেন সেভ থাকার জায়গা পায়
  html2pdf().set({
    margin: [6, 10, 6, 10], 
    filename: `NUBTK_Routine_Section_${document.getElementById('section-input').value}.pdf`,
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: { scale: 2, useCORS: true, scrollY: 0 },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' }
  }).from(el).save();
  notify('⬇️ Downloading PDF...');
}

function downloadRoutineJPG() {
  const el = document.getElementById('routine-printable');
  html2canvas(el, { scale: 2, useCORS: true, scrollY: 0, backgroundColor: '#fff' }).then(canvas => {
    const link = document.createElement('a');
    link.download = `NUBTK_Routine_Section_${document.getElementById('section-input').value}.jpg`;
    link.href = canvas.toDataURL('image/jpeg', 0.95);
    link.click();
  });
  notify('🖼️ Downloading JPG...');
}

// ─── MANUAL ROUTINE BUILDER (Admin Style) ───
function loadManualBuilder() {
  const sec = document.getElementById('section-input').value.trim().toUpperCase() || 'CUSTOM';
  const result = document.getElementById('routine-result');

  // অ্যাডমিন প্যানেলের মতো ইনপুট ফর্ম তৈরি
  let html = `
  <div class="section-card" style="background:#f8fafc; border: 1px solid #e2e8f0;">
    <h3 style="color:var(--gold);margin-bottom:8px; text-align:center;">Manual Builder: Section ${sec}</h3>
    <p style="font-size:0.85rem; color:#64748b; text-align:center; margin-bottom:25px;">Fill in your courses and room numbers. Leave blank if there's no class.</p>
    <div>`;

  DAYS.forEach(day => {
    html += `<div class="routine-day-block"><h4>${day}</h4>`;
    TIME_SLOTS.forEach(time => {
      const key = `${day}|${time}`;
      html += `<div class="routine-slot-row">
        <span class="slot-time">${time}</span>
        <input type="text" class="slot-input course-input" placeholder="Course Code" data-key="${key}" data-field="course"/>
        <input type="text" class="slot-input room-input" placeholder="Room No." data-key="${key}" data-field="room"/>
        <select class="slot-input slot-type-sel" data-key="${key}" data-field="type">
          <option value="theory">Theory</option>
          <option value="lab">Lab</option>
          <option value="phy-lab">Phy Lab</option>
        </select>
      </div>`;
    });
    html += `</div>`;
  });

  html += `</div>
    <div class="btn-row" style="justify-content: center; margin-top: 25px;">
      <button class="btn btn-gold" onclick="previewManualRoutine('${sec}')">👁️ Preview & Download</button>
      <button class="btn btn-outline" onclick="document.getElementById('routine-result').innerHTML=''">❌ Cancel</button>
    </div>
  </div>`;

  result.innerHTML = html;
  notify('✍️ Manual Builder Loaded!');
}

function previewManualRoutine(sec) {
  const secData = {};
  
  // ফর্ম থেকে ডাটা কালেক্ট করা
  document.querySelectorAll('.slot-input[data-key]').forEach(el => {
    const key = el.dataset.key;
    const field = el.dataset.field;
    if (!secData[key]) secData[key] = {};
    secData[key][field] = el.value.trim();
  });

  // ফাঁকা ঘরগুলো ডিলিট করা
  Object.keys(secData).forEach(k => {
    if (!secData[k].course) delete secData[k];
  });

  // প্রিন্ট করার জন্য টেবিল জেনারেট করা
  let rows = '';
  TIME_SLOTS.forEach(time => {
    let row = `<tr><td style="font-weight:700;color:#0B1D3A;white-space:nowrap;background:#f8f8ff;padding:8px 12px;">${time}</td>`;
    DAYS.forEach(day => {
      const key = `${day}|${time}`;
      const cell = secData[key];
      if (cell) {
        const badgeClass = cell.type === 'lab' ? 'badge-lab' : cell.type === 'phy-lab' ? 'badge-phy-lab' : 'badge-theory';
        const badgeLabel = cell.type === 'lab' ? 'LAB' : cell.type === 'phy-lab' ? 'PHY LAB' : 'THEORY';
        row += `<td>
          <div class="cell-course">${cell.course}</div>
          <div class="cell-room">${cell.room}</div>
          <span class="cell-badge ${badgeClass}">${badgeLabel}</span>
        </td>`;
      } else {
        row += `<td class="empty">—</td>`;
      }
    });
    row += '</tr>';
    rows += row;
  });

  const result = document.getElementById('routine-result');
  result.innerHTML = `
    <div class="section-card" style="padding:0;overflow:hidden;" id="routine-card">
      <div style="padding:24px 28px 0;">
        <div class="btn-row" style="margin-top:0;margin-bottom:20px; display:flex; justify-content:center; gap:10px;">
          <button class="btn btn-gold" onclick="downloadRoutinePDF()">⬇️ Download PDF</button>
          <button class="btn btn-outline" onclick="downloadRoutineJPG()">🖼️ Download JPG</button>
          <button class="btn btn-outline" style="border-color:#f87171; color:#f87171;" onclick="loadManualBuilder()">✏️ Back to Edit</button>
        </div>
      </div>
      <div style="padding:0 28px 28px;">
        <div class="routine-output-wrap" id="routine-printable">
          <div class="routine-header-block">
            <div class="uni">Northern University of Business &amp; Technology Khulna</div>
            <div class="title">Class Schedule · Custom Builder</div>
            <div class="section-badge">SECTION — ${sec}</div>
          </div>
          <div style="overflow-x:auto;">
            <table class="routine-table">
              <thead>
                <tr>
                  <th>TIME</th>
                  ${DAYS.map(d => `<th>${d.toUpperCase()}</th>`).join('')}
                </tr>
              </thead>
              <tbody>${rows}</tbody>
            </table>
          </div>
        </div>
      </div>
    </div>`;
}

</script>

<script src="../navbar.js"></script>
</body>
</html>
