<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teacher's Directory - NUBTK</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-check-compat.js"></script>
  
  <style>
    /* CSS Variables matching your NUBTK portal */
    :root {
      --bg-dark: #0B1D3A;
      --card-bg: #112b56;
      --gold: #C9A84C;
      --text-light: #f0f0f0;
      --muted: #a0aec0;
    }
    
    body { 
      margin: 0; 
      font-family: 'DM Sans', sans-serif; 
      background: var(--bg-dark); 
      color: var(--text-light); 
    }
    
    .header { text-align: center; padding: 100px 20px 20px; }
    .header h1 { color: var(--gold); margin: 0 0 10px 0; font-size: 2rem; }
    
    /* Search Bar Styling */
    .search-container { text-align: center; margin-bottom: 30px; padding: 0 20px;}
    .search-bar { 
      width: 100%; max-width: 500px; padding: 14px 24px; 
      border-radius: 50px; border: 2px solid rgba(201,168,76,0.5); 
      background: rgba(255,255,255,0.05); color: white; 
      font-size: 1rem; outline: none; transition: 0.3s;
    }
    .search-bar:focus { border-color: var(--gold); background: rgba(255,255,255,0.1); }
    .search-bar::placeholder { color: var(--muted); }
    
    .container { max-width: 1100px; margin: 0 auto; padding: 0 20px 60px; }
    
    /* Grid Layout for Profile Cards */
    .grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
      gap: 25px; 
    }
    
    /* Teacher Card Styling */
    .t-card { 
      background: var(--card-bg); 
      border: 1px solid rgba(255,255,255,0.05); 
      border-radius: 16px; 
      padding: 30px 20px; 
      text-align: center; 
      transition: all 0.3s ease; 
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    .t-card:hover { 
      transform: translateY(-8px); 
      border-color: var(--gold); 
      box-shadow: 0 8px 25px rgba(0,0,0,0.4);
    }
    
    .t-img { 
      width: 110px; height: 110px; 
      border-radius: 50%; object-fit: cover; 
      border: 3px solid var(--gold); 
      margin-bottom: 15px; background: white;
    }
    
    .t-name { font-size: 1.25rem; font-weight: bold; color: var(--gold); margin-bottom: 4px; }
    .t-desig { font-size: 1rem; font-weight: 600; color: white; margin-bottom: 2px; }
    .t-dept { font-size: 0.85rem; color: var(--muted); margin-bottom: 18px; text-transform: uppercase; letter-spacing: 1px;}
    /* 🆕 Teachers Short Name Badge Style */
     .t-short {
          display: inline-block; /* লেখা অনুযায়ী বক্সের সাইজ হবে */
          background: linear-gradient(135deg, #e1b365 0%, #c9a84c 100%); /* আপনার গোল্ডেন কালারের গ্রেডিয়েন্ট */
          color: #000; /* গোল্ডেনের ওপর কালো লেখা ফুটে উঠবে */
          font-family: var(--ff-head); /* হেডিং ফন্ট ব্যবহার করা হলো */
          font-weight: bold;
          font-size: 0.7rem; /* ছোট সাইজ */
          padding: 3px 8px; /* একটু প্যাডিং যাতে বর্ডার থেকে দূরে থাকে */
          border-radius: 4px; /* হালকা গোল কোণা */
          margin-top: 4px; /* ওপরের ডিপার্টমেন্ট থেকে দূরত্ব */
          margin-bottom: 6px; /* নিচের ডেসিগনেশন থেকে দূরত্ব */
          letter-spacing: 0.5px; /* অক্ষরগুলো একটু ফাঁকা ফাঁকা */
          text-transform: uppercase; /* সবসময় বড় হাতের হবে */
          box-shadow: 0 2px 5px rgba(0,0,0,0.2); /* হালকা ছায়া */
        }
    
    .t-contact { 
      font-size: 0.9rem; color: #ddd; 
      background: rgba(0,0,0,0.25); 
      padding: 12px; border-radius: 10px; 
      word-break: break-all;
    }
    .t-contact div { display: flex; align-items: center; justify-content: center; gap: 8px; margin: 4px 0; }
  </style>
</head>
<body>
  
  <div class="header">
    <h1>👨‍🏫 Teacher's Directory</h1>
    <p style="color:var(--muted); font-size: 1.1rem;">Find your respected faculty members and contact info easily.</p>
  </div>

  <div class="search-container">
    <input type="text" id="search-input" class="search-bar" placeholder="🔍 Search by name, department or designation..." onkeyup="filterTeachers()">
  </div>

  <div class="container">
    <div class="grid" id="teachers-grid">
      <div style="text-align:center; color:var(--muted); grid-column: 1 / -1; padding: 40px; font-size: 1.1rem;">
        ⏳ Loading directory from Live Database...
      </div>
    </div>
  </div>

  <script>
    // ─── FIREBASE SETUP ───
    const firebaseConfig = {
      apiKey: "AIzaSyBU5UyzEIxCuYN5xGLuGL_p4aGltqStylA",
      authDomain: "nubtk-portal.firebaseapp.com",
      databaseURL: "https://nubtk-portal-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "nubtk-portal",
      storageBucket: "nubtk-portal.firebasestorage.app",
      messagingSenderId: "45891604739",
      appId: "1:45891604739:web:33251f784080f09816d936"
    };
    firebase.initializeApp(firebaseConfig);
    const appCheck = firebase.appCheck();
appCheck.activate(
  '6LfgyEEtAAAAAHQSS-8guIgRI_pdHO3kyar9Lreo', // তোমার Site key
  true // token auto-refresh
);
    const db = firebase.database();

    let allTeachers = []; 

    // ─── DEFAULT VECTOR AVATARS ───
    const maleAvatar = "data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23C9A84C'%3E%3Cpath d='M12,2C9.79,2 8,3.79 8,6C8,8.21 9.79,10 12,10C14.21,10 16,8.21 16,6C16,3.79 14.21,2 12,2M12,11C9.33,11 4,12.34 4,15V18H9.37C9.13,17.39 9,16.71 9,16V13.8L12,18.3L15,13.8V16C15,16.71 14.87,17.39 14.63,18H20V15C20,12.34 14.67,11 12,11Z'/%3E%3C/svg%3E";
    
    const femaleAvatar = "data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23C9A84C'%3E%3Cpath d='M12,4A4,4 0 0,1 16,8A4,4 0 0,1 12,12A4,4 0 0,1 8,8A4,4 0 0,1 12,4M12,14C16.42,14 20,15.79 20,18V20H4V18C4,15.79 7.58,14 12,14Z'/%3E%3C/svg%3E";

    // ফায়ারবেস থেকে লাইভ ডেটা আনা হচ্ছে
    db.ref('teachers').on('value', (snapshot) => {
      const data = snapshot.val() || {};
      allTeachers = Object.values(data);
      renderTeachers(allTeachers);
    });

    // টিচারদের কার্ড রেন্ডার করার ফাংশন (Acronym ব্যাজ সহ)
    function renderTeachers(list) {
      const grid = document.getElementById('teachers-grid');
      
      if(list.length === 0) {
        grid.innerHTML = '<div style="text-align:center; color:var(--muted); grid-column: 1 / -1; padding: 40px; font-size:1.1rem;">No teachers found in the directory.</div>';
        return;
      }
      
      grid.innerHTML = list.map(t => {
        let finalImage = t.image;
        if (!finalImage) {
          finalImage = (t.gender === 'female') ? femaleAvatar : maleAvatar;
        }
        
        // Acronym থাকলে নামের পাশে সুন্দর গোল্ডেন ব্যাজ হিসেবে দেখাবে
        const acroBadge = t.acronym ? `<span style="background:var(--gold); color:var(--bg-dark); font-size:0.8rem; padding:2px 8px; border-radius:12px; font-weight:900; margin-left:8px; vertical-align:middle;">${t.acronym}</span>` : '';
        
        return `
          <div class="t-card">
            <div style="background: white; width: 110px; height: 110px; border-radius: 50%; border: 3px solid var(--gold); margin: 0 auto 15px; display:flex; align-items:center; justify-content:center; overflow:hidden;">
                <img src="${finalImage}" style="width:100%; height:100%; object-fit:cover;" alt="Profile Photo">
            </div>
            <div class="t-name" style="display:flex; align-items:center; justify-content:center; flex-wrap:wrap; gap:5px;">
              ${t.name}
            </div>
            <div class="t-desig">${t.designation}</div>
            <div class="t-dept">Dept. of ${t.dept}</div>
            
            ${t.acronym ? `<div class="t-short">${t.acronym}</div>` : ''}
            
            ${(t.email || t.phone) ? `
            <div class="t-contact">
              ${t.email ? `<div>📧 <span>${t.email}</span></div>` : ''}
              ${t.phone ? `<div>📞 <span>${t.phone}</span></div>` : ''}
            </div>` : ''}
          </div>
        `;
      }).join('');
    }

    // সার্চ ফিল্টার লজিক (এখন স্টুডেন্টরা Acronym দিয়েও সার্চ করতে পারবে)
    function filterTeachers() {
      const query = document.getElementById('search-input').value.toLowerCase();
      const filtered = allTeachers.filter(t => 
        (t.name && t.name.toLowerCase().includes(query)) || 
        (t.acronym && t.acronym.toLowerCase().includes(query)) || // Acronym দিয়ে সার্চ সাপোর্ট যোগ করা হলো
        (t.dept && t.dept.toLowerCase().includes(query)) || 
        (t.designation && t.designation.toLowerCase().includes(query))
      );
      renderTeachers(filtered);
    }


    (function() {
  const PAGE_NAME = 'teachers'; // পেজ অনুযায়ী নাম চেঞ্জ করবেন (যেমন cover.html এর জন্য 'cover' দেবেন)
  const db = firebase.database();
  
  // Total visit count
  db.ref('visitors/total_visits').transaction(v => (v || 0) + 1).catch(e => console.error(e));
  db.ref('visitors/pages/' + PAGE_NAME).transaction(v => (v || 0) + 1).catch(e => console.error(e));
  
  // Online count — ডট (.) সমস্যা ফিক্স করা হয়েছে
  const onlineRef = db.ref('visitors/online_count');
  
  // সেফ আইডি তৈরি
  const safeRandomId = Date.now() + '_' + Math.floor(Math.random() * 1000);
  const userRef = db.ref('visitors/online_users/' + safeRandomId);
  
  userRef.set(true).catch(e => console.error(e));
  userRef.onDisconnect().remove();
  
  db.ref('visitors/online_users').on('value', snap => {
    const count = snap.numChildren();
    onlineRef.set(count).catch(e => console.error(e));
  });
})();
    
  </script>

  <script src="../navbar.js"></script>
</body>
</html>
