<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Snake Multiplayer — NUBTK Portal</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <style>
    body { background: #0f172a; display: flex; flex-direction: column; align-items: center; color: white; }
    canvas { background: #000; border: 4px solid #334155; margin-top: 20px; }
    .controls { margin-top: 15px; font-size: 0.9rem; color: #94a3b8; }
  </style>
</head>
<body>

<div class="page-header" style="text-align: center;">
  <h1>Snake Multiplayer 🐍</h1>
  <p>Player 1 (WASD) vs Player 2 (Arrows)</p>
</div>

<canvas id="gameCanvas" width="400" height="400"></canvas>

<div class="controls">
  <p>P1: W,A,S,D | P2: Arrows</p>
</div>

<script>
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const gridSize = 20;

  let snake1 = [{x: 5, y: 10}];
  let dir1 = {x: 1, y: 0};
  let snake2 = [{x: 15, y: 10}];
  let dir2 = {x: -1, y: 0};
  let food = {x: 10, y: 10};

  function draw() {
    ctx.fillStyle = 'black';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Food
    ctx.fillStyle = 'red';
    ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize-2, gridSize-2);

    // Snake 1 (Blue)
    ctx.fillStyle = 'cyan';
    snake1.forEach(part => ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize-2, gridSize-2));

    // Snake 2 (Yellow)
    ctx.fillStyle = 'yellow';
    snake2.forEach(part => ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize-2, gridSize-2));
  }

  function update() {
    // Move logic
    moveSnake(snake1, dir1);
    moveSnake(snake2, dir2);
    
    // Check collision logic here...
    draw();
  }

  function moveSnake(snake, dir) {
    let head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};
    snake.unshift(head);
    snake.pop();
  }

  window.addEventListener('keydown', e => {
    switch(e.key) {
      case 'w': dir1 = {x: 0, y: -1}; break;
      case 's': dir1 = {x: 0, y: 1}; break;
      case 'a': dir1 = {x: -1, y: 0}; break;
      case 'd': dir1 = {x: 1, y: 0}; break;
      case 'ArrowUp': dir2 = {x: 0, y: -1}; break;
      case 'ArrowDown': dir2 = {x: 0, y: 1}; break;
      case 'ArrowLeft': dir2 = {x: -1, y: 0}; break;
      case 'ArrowRight': dir2 = {x: 1, y: 0}; break;
    }
  });

  setInterval(update, 100);
</script>

</body>
</html>
