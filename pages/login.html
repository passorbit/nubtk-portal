<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Authentication — NUBTK Portal</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-check-compat.js"></script>

  <style>
    .auth-container { max-width: 450px; margin: 40px auto; }
    .auth-toggle { display: flex; justify-content: center; gap: 20px; margin-bottom: 25px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
    .auth-toggle-btn { background: none; border: none; color: var(--muted); font-size: 1.1rem; font-weight: 600; cursor: pointer; padding: 5px 10px; transition: 0.2s; }
    .auth-toggle-btn.active { color: var(--gold); border-bottom: 2px solid var(--gold); }
    .auth-form { display: none; }
    .auth-form.active { display: block; animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

<div class="page-wrap" style="padding-bottom:60px;">
  <div class="page-header" style="text-align: center;">
    <h1>🎓 Student Account</h1>
    <p>Sign in to access your profile and unlock smart auto-fill features.</p>
  </div>

  <div class="auth-container">
    <div class="section-card">
      
      <div class="auth-toggle">
        <button class="auth-toggle-btn active" onclick="toggleAuth('login')">Sign In</button>
        <button class="auth-toggle-btn" onclick="toggleAuth('register')">Register</button>
      </div>

      <div id="form-login" class="auth-form active">
        <div class="form-group" style="margin-bottom:14px;">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-input" id="login-email" placeholder="Enter your registered email"/>
        </div>
        <div class="form-group" style="margin-bottom:20px;">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" id="login-pw" placeholder="Enter your password" onkeydown="if(event.key==='Enter') handleLogin()"/>
        </div>
        <button class="btn btn-gold" style="width: 100%; justify-content: center;" onclick="handleLogin()">Sign In →</button>
      </div>

      <div id="form-register" class="auth-form">
        <div class="form-group" style="margin-bottom:12px;">
          <label class="form-label">Full Name *</label>
          <input type="text" class="form-input" id="reg-name" placeholder="e.g. Suvro Mollick"/>
        </div>
        <div class="form-group" style="margin-bottom:12px;">
          <label class="form-label">Student ID *</label>
          <input type="text" class="form-input" id="reg-id" placeholder="e.g. 11240321910"/>
        </div>
        <div class="form-group" style="margin-bottom:12px;">
          <label class="form-label">Email Address *</label>
          <input type="email" class="form-input" id="reg-email" placeholder="Your institutional/personal email"/>
        </div>
        <div class="form-group" style="margin-bottom:20px;">
          <label class="form-label">Create Password *</label>
          <input type="password" class="form-input" id="reg-pw" placeholder="Minimum 6 characters"/>
        </div>
        <button class="btn btn-gold" style="width: 100%; justify-content: center;" onclick="handleRegister()">Create Account 🎉</button>
      </div>

    </div>
  </div>
</div>

<div class="notif" id="notif"></div>

<script>
// --- HELPERS ---
function notify(msg, dur=2800) {
  const n = document.getElementById('notif');
  n.textContent = msg; n.classList.add('show');
  setTimeout(() => n.classList.remove('show'), dur);
}

function toggleAuth(type) {
  document.querySelectorAll('.auth-toggle-btn').forEach((b, i) => b.classList.toggle('active', ['login', 'register'][i] === type));
  document.getElementById('form-login').classList.toggle('active', type === 'login');
  document.getElementById('form-register').classList.toggle('active', type === 'register');
}

// --- FIREBASE INITIALIZATION ---
const firebaseConfig = {
  apiKey: "AIzaSyBU5UyzEIxCuYN5xGLuGL_p4aGltqStylA",
  authDomain: "nubtk-portal.firebaseapp.com",
  databaseURL: "https://nubtk-portal-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "nubtk-portal",
  storageBucket: "nubtk-portal.firebasestorage.app",
  messagingSenderId: "45891604739",
  appId: "1:45891604739:web:33251f784080f09816d936"
};
firebase.initializeApp(firebaseConfig);
const appCheck = firebase.appCheck();
appCheck.activate(new firebase.appCheck.ReCaptchaV3Provider('6LcPtEItAAAAAI8ba4bJ1v6qihfg8dFkVmMKKfGI'), true);

const auth = firebase.auth();
const db = firebase.database();

// --- LOGIN LOGIC ---
function handleLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pw = document.getElementById('login-pw').value;

  if (!email || !pw) { notify('⚠️ Please fill in all fields!'); return; }

  notify('⏳ Signing in...');
  auth.signInWithEmailAndPassword(email, pw)
    .then(() => {
      notify('✅ Login Successful!');
      setTimeout(() => { window.location.href = 'profile.html'; }, 1000);
    })
    .catch(err => {
      notify('❌ Login failed! Check your credentials.');
      console.error(err);
    });
}

// --- REGISTRATION LOGIC WITH DUPLICATE CHECK ---
function handleRegister() {
  const name = document.getElementById('reg-name').value.trim();
  const studentId = document.getElementById('reg-id').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const pw = document.getElementById('reg-pw').value;

  if (!name || !studentId || !email || !pw) { notify('⚠️ All fields are required!'); return; }
  if (pw.length < 6) { notify('⚠️ Password must be at least 6 characters!'); return; }

  notify('⏳ Checking Student ID...');
  
  // ডুপ্লিকেট আইডি চেক করার লজিক
  db.ref('taken_student_ids/' + studentId).once('value')
    .then((snapshot) => {
      if (snapshot.exists()) {
        // যদি আইডি আগে থেকেই থাকে, তবে মেসেজ এবং সাপোর্ট লিংক দেখাবে
        const n = document.getElementById('notif');
        n.innerHTML = `⚠️ This ID is already registered!<br><span style="font-size:0.85rem; margin-top:6px; display:inline-block;">If you think someone else used your ID, please <a href="support.html" style="color:var(--gold); text-decoration:underline;">contact Support</a>.</span>`;
        n.classList.add('show');
        setTimeout(() => n.classList.remove('show'), 6000); // মেসেজটা একটু বেশি সময় (৬ সেকেন্ড) স্ক্রিনে থাকবে
      } else {
        // আইডি ফ্রি থাকলে অ্যাকাউন্ট তৈরি করবে
        notify('⏳ Creating account...');
        auth.createUserWithEmailAndPassword(email, pw)
          .then((userCredential) => {
            const user = userCredential.user;
            
            const updates = {};
        updates['registered_students/' + user.uid] = {
          name: name, studentId: studentId, email: email,
          department: '', course: '', courseCode: ''
        };
        updates['taken_student_ids/' + studentId] = true;

        db.ref().update(updates).then(() => {
          notify('🎉 Registration Successful!');
          setTimeout(() => { window.location.href = 'profile.html'; }, 1200);
        }).catch(err => {
  notify('❌ Account created but profile save failed! Contact support.');
  console.error(err);
        });
          })
          .catch(err => {
            notify('❌ Registration failed! Email might be already in use.');
            console.error(err);
          });
      }
    })
    .catch(err => {
      notify('❌ Database error during validation.');
      console.error(err);
    });
}

// ইউজার যদি অলরেডি লগইন করা থাকে, তাকে সরাসরি প্রোফাইল পেজে পাঠিয়ে দেবে
auth.onAuthStateChanged((user) => {
  if (user) { window.location.href = 'profile.html'; }
});
</script>

<script src="../navbar.js"></script>
</body>
</html>
