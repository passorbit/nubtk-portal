<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Typing Ninja — NUBTK Portal</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    /* ⌨️ Typing Ninja Styles */
    .game-wrapper {
      max-width: 500px;
      margin: 30px auto;
      text-align: center;
      background: #0f172a;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      color: white;
    }
    .stats-bar {
      display: flex;
      justify-content: space-between;
      background: #1e293b;
      padding: 10px 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      font-size: 1.1rem;
      font-weight: 700;
    }
    .stats-bar span { color: #C9A84C; }
    .stats-bar .lives { color: #ef4444; }

    .game-area {
      position: relative;
      height: 350px;
      background: #000;
      border-radius: 12px;
      border: 2px solid #334155;
      overflow: hidden;
      margin-bottom: 20px;
      box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
    }
    
    .falling-word {
      position: absolute;
      top: -30px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 1.8rem;
      font-weight: 800;
      color: #38bdf8;
      text-shadow: 0 0 10px rgba(56, 189, 248, 0.6);
      font-family: 'DM Sans', sans-serif;
      white-space: nowrap;
    }

    .input-area {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    
    .type-input {
      width: 100%;
      padding: 15px;
      font-size: 1.2rem;
      font-weight: 600;
      border-radius: 10px;
      border: 2px solid #C9A84C;
      background: #1e293b;
      color: white;
      text-align: center;
      outline: none;
      transition: 0.3s;
    }
    .type-input:focus {
      border-color: #38bdf8;
      box-shadow: 0 0 15px rgba(56, 189, 248, 0.3);
    }
    
    .btn-start {
      background: #C9A84C;
      color: #0f172a;
      border: none;
      padding: 12px;
      font-size: 1.2rem;
      font-weight: 700;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.2s;
    }
    .btn-start:hover {
      background: #b4933b;
      transform: scale(1.02);
    }

    #game-over {
      display: none;
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(15, 23, 42, 0.9);
      color: white;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      border-radius: 12px;
      z-index: 10;
    }
    #game-over h2 { font-size: 2.5rem; color: #ef4444; margin-bottom: 10px; }
  </style>
</head>
<body>

<div class="page-wrap" style="padding-bottom:60px;">
  <div class="page-header">
    <div class="breadcrumb"><a href="../index.html">Home</a> › <a href="games.html">Games Zone</a> › Typing Ninja</div>
    <h1>Typing Ninja ⌨️</h1>
    <p>Destroy the words before they hit the ground!</p>
  </div>

  <div class="game-wrapper">
    <div class="stats-bar">
      <div>Score: <span id="score">0</span></div>
      <div>Level: <span id="level">1</span></div>
      <div class="lives">Lives: <span id="lives">❤️❤️❤️</span></div>
    </div>
    
    <div class="game-area">
      <div id="word" class="falling-word">Press Start</div>
      <div id="game-over">
        <h2>Game Over</h2>
        <p>Final Score: <span id="final-score" style="color:#C9A84C; font-weight:bold;">0</span></p>
      </div>
    </div>

    <div class="input-area">
      <input type="text" id="type-input" class="type-input" placeholder="Tap here to type..." autocomplete="off" disabled>
      <button id="start-btn" class="btn-start" onclick="startGame()">▶ Start Game</button>
    </div>
  </div>
</div>

<script>
  // ১৫০+ শব্দের ডাইনামিক ভাণ্ডার (সহজ থেকে কঠিন)
  const wordBank = [
    // Level 1: Short & Easy (3-4 letters)
    "bug","run","api","css","tag","web","app","net","bit","ram","cpu","mac","ip","dns","url",
    "git","bot","dev","hub","jar","log","npm","os","sql","zip","var","let","dom","gui","php",
    // Level 2: Medium (5-7 letters)
    "code","java","node","html","data","base","hack","tech","logic","loop","array","stack","queue",
    "pixel","virus","debug","react","cloud","cyber","query","scope","token","valid","agile","cache",
    "server","client","object","string","number","boolean","method","class","script","syntax","plugin",
    "commit","branch","merge","deploy","linux","ubuntu","window","router","switch","socket","packet",
    // Level 3: Hard (8+ letters)
    "algorithm","database","assignment","deadline","faculty","variable","function","compiler","network",
    "protocol","security","terminal","frontend","backend","software","hardware","interface","framework",
    "responsive","encryption","developer","engineer","programming","javascript","typescript","debugging",
    "repository","deployment","architecture","application","automation","bandwidth","cybersecurity",
    "firewall","iteration","middleware","optimization","parameter","polymorphism","scalability"
  ];

  let score = 0;
  let level = 1;
  let lifeCount = 3;
  let speed = 1.5;
  let currentWord = "";
  let wordY = -30;
  let gameInterval;
  let isPlaying = false;

  const wordObj = document.getElementById('word');
  const scoreObj = document.getElementById('score');
  const levelObj = document.getElementById('level');
  const livesObj = document.getElementById('lives');
  const typeInput = document.getElementById('type-input');
  const startBtn = document.getElementById('start-btn');
  const gameOverScreen = document.getElementById('game-over');
  const finalScoreObj = document.getElementById('final-score');

  function getWord() {
    // লেভেল অনুযায়ী শব্দ কঠিন হবে
    let maxIndex = Math.min(wordBank.length, level * 25 + 30);
    return wordBank[Math.floor(Math.random() * maxIndex)];
  }

  function spawnWord() {
    currentWord = getWord();
    wordObj.innerText = currentWord;
    wordY = -30;
    
    // লেভেল বাড়লে স্পিডও বাড়বে
    speed = 1.5 + (level * 0.3);
    
    // র‍্যান্ডম X পজিশন (যাতে সব সময় মাঝখান থেকে না পড়ে)
    let randomX = Math.floor(Math.random() * 60) + 20; // 20% to 80%
    wordObj.style.left = `${randomX}%`;
  }

  function startGame() {
    score = 0;
    level = 1;
    lifeCount = 3;
    speed = 1.5;
    isPlaying = true;
    
    scoreObj.innerText = score;
    levelObj.innerText = level;
    updateLivesDisplay();
    
    gameOverScreen.style.display = 'none';
    startBtn.style.display = 'none';
    typeInput.disabled = false;
    typeInput.value = '';
    typeInput.focus();
    
    spawnWord();
    clearInterval(gameInterval);
    gameInterval = setInterval(gameLoop, 30);
  }

  function gameLoop() {
    if (!isPlaying) return;
    
    wordY += speed;
    wordObj.style.top = `${wordY}px`;
    
    // শব্দ যদি মাটি (bottom) স্পর্শ করে
    if (wordY > 350) {
      lifeCount--;
      updateLivesDisplay();
      
      // স্ক্রিন একটু লাল হওয়ার ইফেক্ট (ভুল হলে)
      document.querySelector('.game-area').style.boxShadow = "inset 0 0 30px rgba(239, 68, 68, 0.8)";
      setTimeout(() => {
        document.querySelector('.game-area').style.boxShadow = "inset 0 0 20px rgba(0,0,0,0.5)";
      }, 300);

      if (lifeCount <= 0) {
        endGame();
      } else {
        typeInput.value = '';
        spawnWord();
      }
    }
  }

  // ইনপুটে টাইপ করার লজিক
  typeInput.addEventListener('input', (e) => {
    if (!isPlaying) return;
    
    let typedText = e.target.value.trim().toLowerCase();
    
    if (typedText === currentWord) {
      score += 10;
      scoreObj.innerText = score;
      
      // প্রতি ১০০ স্কোরে লেভেল আপ
      if (score % 100 === 0) {
        level++;
        levelObj.innerText = level;
        
        // লেভেল আপ ইফেক্ট
        levelObj.style.color = "#10b981";
        levelObj.style.transform = "scale(1.5)";
        setTimeout(() => {
          levelObj.style.color = "#C9A84C";
          levelObj.style.transform = "scale(1)";
        }, 500);
      }
      
      typeInput.value = '';
      spawnWord();
    }
  });

  function updateLivesDisplay() {
    let hearts = "";
    for (let i = 0; i < lifeCount; i++) hearts += "❤️";
    livesObj.innerText = hearts || "💔";
  }

  function endGame() {
    isPlaying = false;
    clearInterval(gameInterval);
    typeInput.disabled = true;
    startBtn.style.display = 'block';
    startBtn.innerText = '🔄 Play Again';
    gameOverScreen.style.display = 'flex';
    finalScoreObj.innerText = score;
  }
</script>

<script src="../navbar.js"></script>
</body>
</html>
