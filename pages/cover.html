<head>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>
  <style>
    /* COVER PAGE PRINT STYLES */
    .cover-preview {
      background: white; color: #111;
      width: 794px; height: 1120px; 
      overflow: hidden;
      padding: 40px 70px; /* Top and bottom margins reduced from 60px to 40px to make room for the logo */
      font-family: 'Times New Roman', serif;
      position: relative; box-sizing: border-box;
    }
    .cover-header { text-align: center; margin-bottom: 20px; } /* Reduced from 36px to 20px */
    
    .cover-logo-row { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px; margin-bottom: 14px; }
    
    .cover-logo-img { 
      width: 165px; height: 165px; /* Logo size increased from 120px to 165px */
      object-fit: contain; 
    }
    
    .cover-uni-name { font-size: 18pt; font-weight: 900; line-height: 1.25; color: #000; }
    .cover-dept { font-size: 13pt; font-weight: 700; margin-top: 8px; color: #111; }
    .cover-divider { border: none; border-top: 2px solid #000; margin: 16px 0; }
    .cover-meta { text-align: center; margin-bottom: 28px; }
    .cover-meta-row { font-size: 11.5pt; margin: 4px 0; color: #111; }
    .cover-meta-row strong { font-weight: 700; }
    .cover-type-badge {
      display: inline-block; font-size: 14pt; font-weight: 900;
      border: 2.5px solid #000; padding: 6px 32px; letter-spacing: 2px;
      text-transform: uppercase; margin: 12px 0;
    }
    
    .cover-title { text-align: center; font-size: 12pt; font-style: italic; margin-bottom: 20px; color: #333; } /* Reduced from 32px to 20px */


/* DESIGN 6: NUBTK Gold Arc (Light & Minimal) - INSPIRED BY NEW IMAGE 1000228421.jpg */
    .template-6 { 
      background: white; color: #111; font-family: 'DM Sans', sans-serif; position: relative; 
      border: 3px solid #C9A84C; border-radius: 20px; /* সুন্দর রাডিয়াস যোগ করা হয়েছে */
      padding: 30px 60px; /* বর্ডারের কারণে প্যাডিং এডজাস্ট করা হয়েছে */
      overflow: hidden;
    }
    /* সূক্ষ্ম জিওমেট্রিক লাইনের কাজ */
    .template-6::before {
      content: ''; position: absolute; top: -50px; left: -50px; 
      width: 150px; height: 150px; border-radius: 50%;
      border: 2px solid rgba(201,168,76,0.3); z-index: 1;
    }
    .template-6::after {
      content: ''; position: absolute; bottom: 100px; right: -80px; 
      width: 250px; height: 250px; border-radius: 50%;
      border: 3px solid rgba(201,168,76,0.2); z-index: 1;
    }
    .template-6 .cover-header { position: relative; z-index: 2; margin-bottom: 12px; }
    .template-6 .cover-logo-img { width: 140px; height: 140px; }
    .template-6 .cover-uni-name { color: #0B1D3A; font-size: 17pt; }
    .template-6 .cover-dept { color: #555; margin-top: 0; font-size: 11.5pt; }
    .template-6 .cover-divider { border-color: #C9A84C; border-width: 2.5px; }
    .template-6 .cover-meta { position: relative; z-index: 2; margin-bottom: 24px; }
    .template-6 .cover-meta-row strong { color: #0B1D3A; }
    .template-6 .cover-type-badge { background: #0B1D3A; color: #C9A84C; border: none; font-size: 13pt; padding: 5px 30px; margin: 10px 0; border-radius: 8px; }
    .template-6 .cover-title { color: #C9A84C; font-size: 14pt; font-weight: bold; font-style: normal; text-decoration: none; border-bottom: 1px solid #ddd; padding-bottom: 10px; margin-bottom: 18px; }
    .template-6 .cover-table { font-family: 'DM Sans', sans-serif; }
    .template-6 .cover-table th { background: #0B1D3A; color: #fff; }
    .template-6 .cover-table td { border-color: rgba(201,168,76,0.2); }
    .template-6 .cover-table td strong { color: #0B1D3A; }
    .template-6 .cover-date { color: #777; font-size: 11pt; border-top: 1px solid #eee; padding-top: 15px; }

    /* DESIGN 7: Fine Line Minimal (Light & Modern) - INSPIRED BY NEW IMAGE 1000228421.jpg */
    .template-7 { 
      background: white; color: #111; font-family: 'DM Sans', sans-serif; position: relative; 
      border: 1px solid #C9A84C; border-radius: 12px;
      padding: 0; overflow: hidden;
    }
    .template-7 .cover-header { text-align: left; padding: 25px 50px 10px; border-bottom: 2px solid #C9A84C; margin-bottom: 20px; }
    .template-7 .cover-logo-row { flex-direction: row; justify-content: flex-start; gap: 20px; }
    .template-7 .cover-logo-img { width: 100px; height: 100px; object-fit: contain; }
    .template-7 .cover-uni-name { font-size: 15pt; color: #0B1D3A; text-align: left;}
    .template-7 .cover-dept { margin-top: 0; font-size: 11pt; color: #555; text-align: left; }
    .template-7 .cover-divider { display: none; }
    .template-7 .cover-meta { text-align: left; padding: 0 50px 0 70px; margin-bottom: 20px; }
    .template-7 .cover-type-badge { background: transparent; color: #C9A84C; border: 2px solid #C9A84C; border-radius: 5px; font-size: 11.5pt; font-weight: 800;}
    .template-7 .cover-title { border: 1px solid #ddd; padding: 12px 20px; border-radius: 8px; text-decoration: none; font-style: normal; color: #111;}
    .template-7 .cover-table, .template-7 .cover-table th, .template-7 .cover-table td { border: none; }
    .template-7 .cover-table th { background: transparent; color: #0B1D3A; border-bottom: 2px solid #ddd; text-align: left; font-size: 13pt; }
    .template-7 .cover-table td { border: none; padding-top: 12px; color: #333; }
    .template-7 .cover-date { bottom: 0; padding: 15px 50px 10px; color: #C9A84C; background: #fafafa; border-top: 1px solid #ddd; font-weight: 700;}

    /* DESIGN 4: Modern Geometric (Charcoal Gold) - Inspired by User Image */
    .template-4 { 
      background: #0B1D3A; /* Deep Dark Blue base like the image theme */
      color: #fff; font-family: 'DM Sans', sans-serif; position: relative; 
      border: 1px solid #0B1D3A; padding-top: 20px;
    }
    /* Geometric Shapes using ::before */
    .template-4::before {
      content: ''; position: absolute; top: -100px; right: -100px; 
      width: 400px; height: 400px; border-radius: 50%;
      background: linear-gradient(135deg, rgba(201,168,76,0.3) 0%, rgba(201,168,76,0) 70%); z-index: 1;
    }
    .template-4 .cover-logo-img { background: white; border-radius: 50%; padding: 10px; border: 4px solid #fff; margin-top: -10px;}
    .template-4 .cover-header { position: relative; z-index: 2; margin-bottom: 10px; }
    .template-4 .cover-uni-name { color: white; font-size: 16pt; }
    .template-4 .cover-dept { color: white; margin-top: 0; font-size: 11pt; }
    .template-4 .cover-divider { display: none; }
    .template-4 .cover-meta { position: relative; z-index: 2; text-align: left; padding: 15px 15px 15px 30px; border-left: 5px solid #C9A84C; background: rgba(255,255,255,0.05); margin-bottom: 20px; border-radius: 0 10px 10px 0;}
    .template-4 .cover-meta-row strong { color: #C9A84C; }
    .template-4 .cover-type-badge { background: #C9A84C; color: #111; border: none; font-size: 12pt; padding: 4px 24px; margin: 8px 0; border-radius: 99px; }
    .template-4 .cover-title { color: white; font-size: 14pt; font-weight: bold; font-style: normal; margin-bottom: 15px; text-decoration: none;}
    .template-4 .cover-table, .template-4 .cover-table th, .template-4 .cover-table td { border-color: rgba(255,255,255,0.2); }
    .template-4 .cover-table th { background: rgba(255,255,255,0.1); color: #C9A84C; }
    .template-4 .cover-table td { color: #f0f0f0; }
    .template-4 .cover-table td strong { color: white; }
    .template-4 .cover-date { background: white; color: #111; padding: 10px; border-radius: 10px 10px 0 0; font-family: sans-serif; }

    /* DESIGN 5: Academic Split (Clean Formal) */
    .template-5 { padding-top: 0; padding-bottom: 0; position: relative; border: 1px solid #111;}
    /* Geometric Accent using ::after */
    .template-5::after {
      content: ''; position: absolute; bottom: 0; right: 0; 
      width: 0; height: 0; border-style: solid; 
      border-width: 0 0 120px 120px; border-color: transparent transparent #C9A84C transparent; z-index: 1;
    }
    .template-5 .cover-header { text-align: left; padding: 30px 40px 10px; border-bottom: 3px solid #111; margin-bottom: 15px;}
    .template-5 .cover-logo-row { flex-direction: row; justify-content: space-between; gap: 0; }
    .template-5 .cover-logo-img { width: 100px; height: 100px; object-fit: contain; }
    .template-5 .cover-uni-name { font-size: 15pt; }
    .template-5 .cover-dept { margin-top: 0; font-size: 12pt; }
    .template-5 .cover-divider { display: none; }
    .template-5 .cover-meta { text-align: left; position: relative; z-index: 2;}
    .template-5 .cover-type-badge { border: 2px solid #111; color: #111; background: transparent; }
    .template-5 .cover-title { border: 1px solid #111; padding: 10px; background: #fafafa; }
    .template-5 .cover-table, .template-5 .cover-table th, .template-5 .cover-table td { border: none; }
    .template-5 .cover-table th { background: transparent; color: #111; border: none; border-bottom: 2px solid #C9A84C; text-align: left; font-size: 13pt; }
    .template-5 .cover-table td { border: none; padding-top: 15px; }
    .template-5 .cover-date { bottom: 0; padding: 15px; border-top: 1px solid #111; background: white; z-index: 2;}

    /* DESIGN 2: Modern Left-Aligned */
    .template-2 .cover-logo-row { flex-direction: row; justify-content: flex-start; gap: 24px; border-bottom: 3px solid #111; padding-bottom: 15px; margin-bottom: 20px; }
    .template-2 .cover-logo-img { width: 90px; height: 90px; }
    .template-2 .cover-header { text-align: left; margin-bottom: 15px; }
    .template-2 .cover-uni-name { font-size: 16pt; }
    .template-2 .cover-dept { margin-top: 0; font-size: 12pt; }
    .template-2 .cover-divider { display: none; }
    .template-2 .cover-meta { text-align: left; }
    .template-2 .cover-title { text-align: left; font-size: 14pt; font-weight: bold; text-decoration: underline; font-style: normal; color: #000; }
    .template-2 .cover-table, .template-2 .cover-table th, .template-2 .cover-table td { border: none; }
    .template-2 .cover-table th { background: transparent; text-align: left; border-bottom: 2px solid #111; padding: 5px 0; color: #111; }
    .template-2 .cover-table td { padding: 15px 0 0 0; }
    .template-2 .cover-date { text-align: left; padding-left: 70px; }

    /* DESIGN 3: Formal Boxed */
    .template-3 { border: 8px double #111; padding: 32px 62px; } /* বর্ডার যোগ করায় প্যাডিং একটু কমানো হয়েছে যেন পেজ ওভারফ্লো না হয় */
    .template-3 .cover-logo-img { width: 140px; height: 140px; }
    .template-3 .cover-type-badge { background: #111; color: white; border: none; }
    .template-3 .cover-table th { background: #111; color: #fff; }
    .template-3 .cover-date { font-family: monospace; font-size: 13pt; font-weight: bold; }
    
    /* ORIGINAL TABLE DESIGN */
    .cover-table {
      width: 100%; border-collapse: collapse; margin-top: 16px;
      font-size: 11pt;
    }
    .cover-table th {
      background: #f0f0f0; text-align: center; padding: 10px 14px;
      border: 1.5px solid #555; font-weight: 700; font-size: 12pt;
    }
    .cover-table td {
      padding: 13px 16px; border: 1.5px solid #555;
      vertical-align: top; line-height: 1.7;
    }
    .cover-table td strong { display: block; }
    
    /* New design: Date at the bottom */
    .cover-date { position: absolute; bottom: 60px; left: 0; right: 0; text-align: center; font-size: 12pt; font-weight: 700; }

    /* PREVIEW WRAPPER (Updated for Mobile Auto-Scale) */
    .preview-scale-outer {
      overflow: hidden; /* Left-right scrolling is disabled. */
      background: #e5e5e5; padding: 28px 0; border-radius: 12px;
      display: flex; justify-content: center; align-items: flex-start;
      transition: height 0.3s ease;
    }
    .preview-shadow { 
      box-shadow: 0 8px 40px rgba(0,0,0,0.35); 
      transform-origin: top center; /* To shrink the page right from the middleয */
    }

    /* SAVED LIST */
    .saved-item {
      background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px;
      padding: 14px 18px; display: flex; align-items: center; gap: 14px; margin-bottom: 10px;
      cursor: pointer; transition: border-color 0.2s;
    }
    .saved-item:hover { border-color: var(--gold); }
    .saved-item-name { flex: 1; font-size: 0.9rem; font-weight: 500; }
    .saved-item-meta { font-size: 0.78rem; color: var(--muted); }

    /* logo admin upload preview */
    .admin-logo-preview {
      display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px;
    }
    .admin-logo-thumb {
      width: 60px; height: 60px; object-fit: contain;
      border: 2px solid var(--border); border-radius: 8px; background: white; padding: 3px;
    }
  </style>

<script>
// ─── HELPERS ────────────────────────────────
function notify(msg, dur=2800) {
  const n = document.getElementById('notif');
  n.textContent = msg; n.classList.add('show');
  setTimeout(() => n.classList.remove('show'), dur);
}
function toggleNav() { document.querySelector('.nav-links').classList.toggle('open'); }

function adjustPreviewScale() {
  const outer = document.querySelector('.preview-scale-outer');
  const shadow = document.querySelector('.preview-shadow');
  if (!outer || !shadow) return;
  
  const availableWidth = outer.clientWidth - 20; 
  const originalWidth = 794; 
  
  if (availableWidth < originalWidth) {
    const scale = availableWidth / originalWidth;
    shadow.style.transform = `scale(${scale})`;
    outer.style.height = `${(1120 * scale) + 60}px`; 
  } else {
    shadow.style.transform = 'scale(1)';
    outer.style.height = 'auto';
  }
}
window.addEventListener('resize', adjustPreviewScale);

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    b.classList.toggle('active', ['edit','preview','saved'][i] === tab);
  });
  document.querySelectorAll('.panel').forEach((p,i) => {
    p.classList.toggle('active', ['panel-edit','panel-preview','panel-saved'][i] === `panel-${tab}`);
  });
  if (tab === 'preview') {
    renderPreview();
    setTimeout(adjustPreviewScale, 10);
  }
  if (tab === 'saved') renderSavedList();
}

// ─── ADMIN CONFIG ───────────────────────────
function getAdminConfig() {
  const saved = localStorage.getItem('nubtk_cover_config');
  if (saved) return JSON.parse(saved);
  return {
    logoOptions: [],
    fields: [
      { id:'dept', label:'Department', type:'select', required:true,
        options:['Computer Science and Engineering','Civil Engineering','Electrical and Electronic Engineering','Architecture','Business Administration','Law','English Language & Literature'] },
      { id:'courseTitle', label:'Course Title', type:'text', required:true, placeholder:'e.g. Data Structures' },
      { id:'courseCode', label:'Course Code', type:'text', required:true, placeholder:'e.g. CSE 2101' },
      { id:'coverType', label:'Type', type:'select', required:true, options:['ASSIGNMENT','LAB REPORT','TERM PAPER','PROJECT REPORT','PRESENTATION'] },
      { id:'coverTitle', label:'Title (Optional)', type:'text', required:false, placeholder:'Assignment/Lab topic' },
      { id:'teacherName', label:"Teacher's Name", type:'text', required:true, placeholder:'e.g. Md. Hasibul Islam' },
      { id:'teacherDesig', label:"Teacher's Designation", type:'select', required:false,
        options:['Lecturer','Senior Lecturer','Assistant Professor','Associate Professor','Professor','Head of Department'] },
      { id:'studentName', label:'Your Name', type:'text', required:true, placeholder:'Your full name' },
      { id:'studentId', label:'Student ID', type:'text', required:true, placeholder:'e.g. 11240321910' },
      { id:'section', label:'Section', type:'text', required:true, placeholder:'e.g. 2D' },
      { id:'submissionDate', label:'Date of Submission', type:'date', required:true },
    ]
  };
}

// ─── RENDER EDIT FIELDS ──────────────────────
function renderFields() {
  const cfg = getAdminConfig();
  const container = document.getElementById('fields-container');
  const saved = JSON.parse(localStorage.getItem('nubtk_cover_draft') || '{}');
  let html = '';

  const logos = cfg.logoOptions && cfg.logoOptions.length > 0 ? cfg.logoOptions : getDefaultLogos();

  // NEW DESIGN Dropdown
  html += `<div class="form-group full">
    <label class="form-label">Select Cover Design</label>
    <select class="form-select" id="form-template" style="margin-bottom: 10px;">
      <option value="template-1" ${saved.template==='template-1'?'selected':''}>Design 1: Classic Center</option>
      <option value="template-2" ${saved.template==='template-2'?'selected':''}>Design 2: Modern Left-Aligned</option>
      <option value="template-3" ${saved.template==='template-3'?'selected':''}>Design 3: Formal Boxed</option>
      <option value="template-4" ${saved.template==='template-4'?'selected':''}>Design 4: Modern Geometric (Dark)</option>
      <option value="template-5" ${saved.template==='template-5'?'selected':''}>Design 5: Academic Split (Light)</option>

      <option value="template-6" ${saved.template==='template-6'?'selected':''}>Design 6: NUBTK Gold Arc</option>
      
      <option value="template-7" ${saved.template==='template-7'?'selected':''}>Design 7: Fine Line Minimal</option> 

</select>
  </div>`;
  html += `<div class="form-group full">
    <label class="form-label">Select Logo</label>
    <div class="logo-grid" id="logo-grid">`;
  logos.forEach((src, i) => {
    const sel = (saved.logoIdx == i) ? 'selected' : '';
    html += `<div class="logo-opt ${sel}" onclick="selectLogo(${i})" data-idx="${i}"><img src="${src}" alt="Logo ${i+1}"/></div>`;
  });
  html += `</div></div>`;

  cfg.fields.forEach(f => {
    const val = saved[f.id] || '';
    const req = f.required ? '*' : '';
    html += `<div class="form-group">
      <label class="form-label">${f.label}${req ? ' <span style="color:var(--gold)">*</span>' : ''}</label>`;
    if (f.type === 'select') {
      html += `<select class="form-select" id="field_${f.id}">
        <option value="">-- Select --</option>`;
      (f.options||[]).forEach(o => html += `<option value="${o}" ${val===o?'selected':''}>${o}</option>`);
      html += `</select>`;
    } else if (f.type === 'date') {
      html += `<input type="date" class="form-input" id="field_${f.id}" value="${val}"/>`;
    } else {
      html += `<input type="text" class="form-input" id="field_${f.id}" placeholder="${f.placeholder||''}" value="${val}"/>`;
    }
    html += `</div>`;
  });

  container.innerHTML = html;
  if (saved.logoIdx !== undefined) selectLogo(saved.logoIdx, false);
}

function getDefaultLogos() {
  const makeLogoSVG = (text, color) =>
    'data:image/svg+xml;utf8,' + encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64"><circle cx="32" cy="32" r="30" fill="${color}" stroke="#ccc" stroke-width="1.5"/><text x="32" y="38" font-size="11" font-family="serif" font-weight="bold" text-anchor="middle" fill="white">${text}</text></svg>`);
  return [
    makeLogoSVG('NUBTK', '#0B1D3A'),
    makeLogoSVG('CSE', '#1a3a6e'),
    makeLogoSVG('NUBTK', '#2a5298'),
    makeLogoSVG('KHU', '#0d2b4e'),
  ];
}

let selectedLogoIdx = null;
function selectLogo(idx, save=true) {
  selectedLogoIdx = idx;
  document.querySelectorAll('.logo-opt').forEach((el, i) => el.classList.toggle('selected', i == idx));
}

// ─── COLLECT FORM DATA ───────────────────────
function collectData() {
  const cfg = getAdminConfig();
  const tempSelect = document.getElementById('form-template');
  
  // লোগোর সাথে টেমপ্লেট ডিজাইনটাও সেভ হচ্ছে
  const data = { 
    logoIdx: selectedLogoIdx,
    template: tempSelect ? tempSelect.value : 'template-1'
  };
  let missingRequired = false;

  cfg.fields.forEach(f => {
    const el = document.getElementById('field_' + f.id);
    if (el) {
      data[f.id] = el.value;
      // চেক করছি কোনো Required ফিল্ড ফাঁকা আছে কি না
      if (f.required && el.value.trim() === '') {
        missingRequired = true;
      }
    }
  });
  return { data, missingRequired };
}

function saveDraft() {
  // প্রিভিউ দেখার সময় কোনো Required চেক করবে না, যা আছে তাই সেভ করবে
  const { data } = collectData(); 
  localStorage.setItem('nubtk_cover_draft', JSON.stringify(data));
  notify('✅ Draft saved!');
}

function saveAndPreview() {
  saveDraft();
  switchTab('preview');
}

function resetForm() {
  localStorage.removeItem('nubtk_cover_draft');
  selectedLogoIdx = null;
  renderFields();
  notify('↺ Form reset');
}

// ─── RENDER PREVIEW ──────────────────────────
function renderPreview() {
  const cfg = getAdminConfig();
  const data = JSON.parse(localStorage.getItem('nubtk_cover_draft') || '{}');
  const logos = cfg.logoOptions && cfg.logoOptions.length > 0 ? cfg.logoOptions : getDefaultLogos();
  const logoSrc = (data.logoIdx !== null && data.logoIdx !== undefined) ? logos[data.logoIdx] : logos[0];

  const dept = data.dept || '';
  const courseTitle = data.courseTitle || '';
  const courseCode = data.courseCode || '';
  const coverType = data.coverType || 'ASSIGNMENT';
  const coverTitle = data.coverTitle || '';
  const teacherName = data.teacherName || '';
  const teacherDesig = data.teacherDesig || 'Lecturer';
  const studentName = data.studentName || '';
  const studentId = data.studentId || '';
  const section = data.section || '';
  const submissionDate = data.submissionDate ? new Date(data.submissionDate).toLocaleDateString('en-GB', {day:'2-digit',month:'2-digit',year:'numeric'}) : '';

  const selectedTemplate = data.template || 'template-1';
  document.getElementById('cover-output').innerHTML = `
  <div class="cover-preview ${selectedTemplate}" id="cover-page">
    <div class="cover-header">
      <div class="cover-logo-row">
        <img class="cover-logo-img" src="${logoSrc}" alt="NUBTK Logo" crossorigin="anonymous"/>
        <div class="cover-uni-name">Northern University of Business<br/>&amp; Technology Khulna</div>
      </div>
      <div class="cover-dept">Department of ${dept || 'Computer Science and Engineering'}</div>
      <hr class="cover-divider"/>
    </div>

    <div class="cover-meta">
      ${courseCode ? `<div class="cover-meta-row"><strong>Course Code:</strong> ${courseCode}</div>` : ''}
      ${courseTitle ? `<div class="cover-meta-row"><strong>Course Title:</strong> ${courseTitle}</div>` : ''}
      <div style="margin-top:16px;">
        <span class="cover-type-badge">${coverType}</span>
      </div>
    </div>

    ${coverTitle ? `<div class="cover-title">"${coverTitle}"</div>` : ''}

    <table class="cover-table">
      <tr>
        <th>Submitted To</th>
        <th>Submitted By</th>
      </tr>
      <tr>
        <td>
          <strong>${teacherName}</strong>
          ${teacherDesig}<br/>
          Department of ${dept || 'Computer Science and Engineering'}<br/>
          Northern University of Business &amp; Technology Khulna.
        </td>
        <td>
          <strong>Name:</strong> ${studentName}<br/>
          <strong>Student ID:</strong> ${studentId}<br/>
          <strong>Section:</strong> ${section}<br/>
          Northern University of Business &amp; Technology Khulna.
        </td>
      </tr>
    </table>

    <div class="cover-date">Date of Submission: ${submissionDate}</div>
  </div>`;
}

// ─── DOWNLOAD ───────────────────────────────
function downloadPDF() {
  const { missingRequired } = collectData();
  
  // ডাউনলোড করার সময় চেক করবে ফিল্ড ফাঁকা আছে কি না
  if (missingRequired) {
    notify('⚠️ Fill the Required Fields first!');
    switchTab('edit'); // ফাঁকা থাকলে এডিট ফর্মে ফেরত পাঠাবে
    return;
  }

  const el = document.getElementById('cover-page');
  const shadow = document.querySelector('.preview-shadow');
  if(shadow) shadow.style.transform = 'scale(1)'; 
  
  html2pdf().set({
    margin: 0, filename: 'NUBTK_Cover_Page.pdf',
    image: { type: 'jpeg', quality: 1 },
    html2canvas: { scale: 2, useCORS: true, scrollY: 0 },
    jsPDF: { unit: 'px', format: [794, 1120], orientation: 'portrait' } 
  }).from(el).save().then(() => {
    adjustPreviewScale(); 
  });
  notify('⬇️ Downloading PDF...');
}

function downloadJPG() {
  const { missingRequired } = collectData();
  
  // ডাউনলোড করার সময় চেক করবে ফিল্ড ফাঁকা আছে কি না
  if (missingRequired) {
    notify('⚠️ Fill the Required Fields first!');
    switchTab('edit'); // ফাঁকা থাকলে এডিট ফর্মে ফেরত পাঠাবে
    return;
  }

  const el = document.getElementById('cover-page');
  const shadow = document.querySelector('.preview-shadow');
  if(shadow) shadow.style.transform = 'scale(1)'; 

  html2canvas(el, { scale: 2, useCORS: true, scrollY: 0, backgroundColor: '#fff' }).then(canvas => {
    const link = document.createElement('a');
    link.download = 'NUBTK_Cover_Page.jpg';
    link.href = canvas.toDataURL('image/jpeg', 0.95);
    link.click();
    adjustPreviewScale(); 
  });
  notify('🖼️ Downloading JPG...');
}

// ─── SAVED DRAFTS ────────────────────────────
function saveDraftNamed() {
  const { data } = collectData(); 
  const name = prompt('Name this cover page:');
  if (!name) return;
  const list = JSON.parse(localStorage.getItem('nubtk_saved_covers') || '[]');
  list.push({ name, data, ts: Date.now() });
  localStorage.setItem('nubtk_saved_covers', JSON.stringify(list));
  notify('✅ Saved: ' + name);
}

function renderSavedList() {
  const list = JSON.parse(localStorage.getItem('nubtk_saved_covers') || '[]');
  const container = document.getElementById('saved-list');
  if (!list.length) { container.innerHTML = '<p style="color:var(--muted);font-size:0.9rem;">No saved cover pages yet. Fill the form and click Save Draft.</p>'; return; }
  container.innerHTML = list.map((item, i) => `
    <div class="saved-item" onclick="loadSaved(${i})">
      <div>
        <div class="saved-item-name">📄 ${item.name}</div>
        <div class="saved-item-meta">${new Date(item.ts).toLocaleDateString()} · ${item.data.coverType||'Assignment'} · Section ${item.data.section||'—'}</div>
      </div>
      <button class="btn btn-danger" style="padding:6px 12px;font-size:0.78rem;" onclick="event.stopPropagation();deleteSaved(${i})">✕</button>
    </div>`).join('');
}

function loadSaved(i) {
  const list = JSON.parse(localStorage.getItem('nubtk_saved_covers') || '[]');
  localStorage.setItem('nubtk_cover_draft', JSON.stringify(list[i].data));
  switchTab('edit');
  renderFields();
  notify('📄 Loaded: ' + list[i].name);
}

function deleteSaved(i) {
  const list = JSON.parse(localStorage.getItem('nubtk_saved_covers') || '[]');
  list.splice(i, 1);
  localStorage.setItem('nubtk_saved_covers', JSON.stringify(list));
  renderSavedList();
  notify('🗑️ Deleted');
}
